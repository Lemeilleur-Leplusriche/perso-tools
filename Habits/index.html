<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#111111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Habits</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#111;--card:#1a1a1a;--border:#252525;--text:#eee;--sub:#888;--dim:#555;--accent:#e8734a;--green:#22c55e;--yellow:#eab308;--red:#ef4444;--blue:#60a5fa;--radius:14px;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--font);max-width:420px;margin:0 auto;min-height:100vh;overflow-x:hidden}
input[type="time"]::-webkit-calendar-picker-indicator{filter:invert(0.5)}
::selection{background:rgba(232,115,74,0.25)}
button:active{transform:scale(.97)}
input:focus{border-color:var(--accent)!important;box-shadow:0 0 0 2px rgba(232,115,74,0.15)}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 0}
.header h1{font-size:18px;font-weight:800;letter-spacing:-0.5px}
.score-badge{font-size:11px;font-weight:700;font-family:var(--mono);color:var(--accent);background:rgba(232,115,74,0.12);padding:3px 8px;border-radius:6px;margin-left:10px}
.date-nav{display:flex;align-items:center;gap:4px}
.date-nav button{background:none;border:none;color:var(--sub);font-size:20px;cursor:pointer;padding:4px 10px;line-height:1}
.date-nav button:disabled{color:#222;cursor:default}
.date-label{font-size:12px;font-weight:600;font-family:var(--mono);min-width:100px;text-align:center;color:var(--sub);background:none;border:none;cursor:pointer}
.date-label.today{color:var(--accent)}
.content{padding:12px 14px 100px;overflow-y:auto}
.tab-content{display:none}.tab-content.active{display:block}
.score-ring{text-align:center;margin:16px 0;position:relative}
.score-num{font-size:40px;font-weight:800;font-family:var(--mono);line-height:1}
.score-den{font-size:12px;color:var(--sub);letter-spacing:2px}
.perfect{margin-top:10px;font-size:13px;color:var(--accent);font-weight:600;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.criteria-list{display:flex;flex-direction:column;gap:6px}
.criterion{display:flex;align-items:center;gap:14px;padding:15px 16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--card);cursor:pointer;transition:all .2s;font-size:15px;color:var(--sub);user-select:none;-webkit-user-select:none;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.criterion:active{transform:scale(.98);box-shadow:none}
.criterion.on{background:rgba(232,115,74,0.1);border-color:rgba(232,115,74,0.3);color:var(--text);box-shadow:0 1px 6px rgba(232,115,74,0.15)}
.criterion .emoji{font-size:22px;width:30px;text-align:center;transition:transform .2s}
.criterion.on .emoji{transform:scale(1.15)}
.criterion .label{flex:1;text-align:left;font-weight:500}
.criterion .check{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:#252525;color:transparent;font-weight:800;font-size:13px;transition:all .25s}
.criterion.on .check{background:var(--accent);color:#000}
.sleep-dur{text-align:center;margin-bottom:28px}
.sleep-dur .val{font-size:56px;font-weight:800;font-family:var(--mono);line-height:1}
.sleep-dur .avg{color:var(--sub);font-size:13px;margin-top:8px}
.time-row{display:flex;gap:12px;margin-bottom:20px}
.time-row>div{flex:1}
.time-row label{color:var(--sub);font-size:11px;letter-spacing:1.5px;display:block;margin-bottom:8px;font-weight:600}
.time-row input{width:100%;padding:14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--card);color:var(--text);font-size:18px;font-family:var(--mono);outline:none}
.card{background:var(--card);border-radius:var(--radius);padding:18px;border:1px solid var(--border)}
.card-title{font-size:11px;color:var(--sub);letter-spacing:1.5px;margin-bottom:10px;font-weight:600}
.quality-row{display:flex;gap:8px;justify-content:center}
.quality-btn{width:44px;height:44px;border-radius:10px;border:none;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;font-family:var(--mono)}
.quality-btn.off{background:#1a1a1a;color:var(--sub)}.quality-btn.on{background:var(--accent);color:#000}
.bar-chart{display:flex;gap:6px;align-items:flex-end;height:80px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar-col .val{font-size:9px;color:var(--sub);font-family:var(--mono)}
.bar-col .bar{width:100%;border-radius:4px;transition:all .3s}
.bar-col .day{font-size:10px;color:var(--sub)}.bar-col .day.active{color:var(--text);font-weight:700}
.macros-row{display:flex;gap:12px;margin-bottom:24px}
.macro-ring{flex:1;display:flex;flex-direction:column;align-items:center;padding:16px}
.macro-ring .label{font-size:10px;color:var(--sub);margin-top:6px;letter-spacing:1px}
.macro-ring .val{font-size:16px;font-weight:800;font-family:var(--mono)}
.secondary-macros{display:flex;justify-content:center;gap:24px;margin-bottom:24px}
.secondary-macros .m-val{font-size:20px;font-weight:700;font-family:var(--mono)}
.secondary-macros .m-label{font-size:10px;color:var(--sub);margin-top:2px}
.meal-input{display:flex;gap:8px;margin-bottom:20px}
.meal-input input{flex:1;padding:14px 16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--card);color:var(--text);font-size:14px;font-family:var(--font);outline:none}
.meal-input button{padding:14px 20px;border-radius:var(--radius);border:none;background:var(--accent);color:#000;font-weight:700;cursor:pointer;font-size:16px}
.meal-input button:disabled{background:#252525;cursor:wait}
.meal-item{display:flex;align-items:center;gap:12px;padding:12px 14px}
.meal-item .info{flex:1}
.meal-item .name{color:var(--text);font-size:14px;font-weight:600}
.meal-item .macros{color:var(--sub);font-size:12px;margin-top:3px;font-family:var(--mono)}
.meal-item .del{background:none;border:none;color:#333;cursor:pointer;font-size:18px;padding:4px}
.empty{text-align:center;color:#333;font-size:13px;padding:28px}
.stats-row{display:flex;justify-content:center;gap:20px;margin-bottom:28px}
.stat{text-align:center}.stat .val{font-size:24px;font-weight:800;font-family:var(--mono)}.stat .label{font-size:10px;color:var(--sub);margin-top:2px}
.heatmap-grid{display:grid;grid-template-columns:repeat(13,1fr);gap:3px}
.heatmap-cell{aspect-ratio:1;border-radius:3px}.heatmap-cell.today-cell{border:1.5px solid var(--text)!important}
.legend{display:flex;align-items:center;justify-content:center;gap:4px;margin-top:12px}
.legend span{font-size:9px;color:var(--sub)}.legend .box{width:12px;height:12px;border-radius:2px}
.streak-msg{text-align:center;margin-top:20px;font-size:14px;color:var(--accent);font-weight:600}
.insights{display:flex;flex-direction:column;gap:14px}
.corr-row{display:flex;justify-content:space-around}.corr-val{font-size:32px;font-weight:800;font-family:var(--mono)}.corr-label{font-size:11px;color:var(--sub)}
.corr-diff{text-align:center;margin-top:12px;font-size:13px;color:#aaa}
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:rgba(17,17,17,.92);backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;padding:6px 0 max(14px,env(safe-area-inset-bottom));z-index:10}
.tabbar button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;color:#333;padding:6px 0}
.tabbar button.active{color:var(--accent)}.tabbar button.active .icon{transform:scale(1.15)}
.tabbar button .icon{font-size:18px}.tabbar button .tlabel{font-size:9px;font-weight:700;letter-spacing:.5px}
.prot-bar-bg{height:8px;background:#252525;border-radius:4px;overflow:hidden;margin:0 4px}
.prot-bar-fill{height:100%;border-radius:4px;transition:width .5s}
.prot-label{display:flex;justify-content:space-between;margin:4px 4px 16px;font-size:10px;color:var(--sub);font-family:var(--mono)}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:8px}
.week-day{text-align:center;padding:8px 0;border-radius:8px;background:var(--card);border:1px solid var(--border)}
.week-day.today-d{border-color:var(--accent)}.week-day .dl{font-size:9px;color:var(--sub);font-weight:600}.week-day .ds{font-size:16px;font-weight:800;font-family:var(--mono);margin-top:2px}
.week-avg{text-align:center;font-size:12px;color:var(--sub);margin-bottom:16px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:420px;padding:24px 16px 40px;max-height:80vh;overflow-y:auto}
.modal h2{font-size:18px;font-weight:700;margin-bottom:16px}
.h-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:10px;margin-bottom:6px;background:var(--bg)}
.h-item .he{font-size:20px;width:28px;text-align:center}.h-item .hl{flex:1;font-size:14px}
.h-item .hd{background:none;border:none;color:#444;font-size:18px;cursor:pointer;padding:4px}
.add-row{display:flex;gap:8px;margin-top:12px}
.add-row input{flex:1;padding:10px 12px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;font-family:var(--font);outline:none}
.add-row button{padding:10px 16px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-weight:700;cursor:pointer;font-size:14px}

/* ─── GRATITUDE ─── */
.grat-today{margin-bottom:24px}
.grat-textarea{width:100%;min-height:100px;padding:16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--card);color:var(--text);font-size:15px;font-family:var(--font);outline:none;resize:vertical;line-height:1.6}
.grat-textarea::placeholder{color:var(--dim)}
.grat-save{margin-top:10px;width:100%;padding:14px;border-radius:var(--radius);border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer}
.grat-save:disabled{background:#252525;color:var(--dim);cursor:default}
.grat-saved{display:flex;align-items:flex-start;gap:12px;padding:16px;background:var(--card);border:1px solid rgba(232,115,74,.2);border-radius:var(--radius);margin-bottom:16px}
.grat-saved .gs-icon{font-size:24px;flex-shrink:0;margin-top:2px}
.grat-saved .gs-text{font-size:14px;line-height:1.6;color:var(--text);flex:1}
.grat-saved .gs-edit{background:none;border:none;color:var(--dim);font-size:14px;cursor:pointer;padding:4px;flex-shrink:0}
.grat-random-wrap{margin-top:8px;margin-bottom:24px;text-align:center}
.grat-random-btn{padding:12px 24px;border-radius:var(--radius);border:1px solid var(--border);background:var(--card);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:8px}
.grat-random-btn:active{border-color:var(--accent)}
.grat-random-card{margin-top:16px;padding:20px;background:linear-gradient(135deg,rgba(232,115,74,.08),rgba(234,179,8,.06));border:1px solid rgba(232,115,74,.2);border-radius:var(--radius);text-align:left;animation:grFade .4s ease}
@keyframes grFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.grat-random-card .gr-date{font-size:11px;color:var(--accent);font-weight:600;margin-bottom:8px;font-family:var(--mono)}
.grat-random-card .gr-text{font-size:15px;line-height:1.6;color:var(--text)}
.grat-history{margin-top:8px}
.grat-history-title{font-size:11px;color:var(--sub);letter-spacing:1.5px;font-weight:600;margin-bottom:12px}
.grat-hist-item{display:flex;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border);align-items:flex-start}
.grat-hist-item:last-child{border-bottom:none}
.grat-hist-date{font-size:11px;color:var(--dim);font-family:var(--mono);min-width:50px;padding-top:2px}
.grat-hist-text{font-size:13px;color:var(--sub);line-height:1.5;flex:1}
.grat-stat-row{display:flex;justify-content:center;gap:24px;margin-bottom:24px}
.grat-stat{text-align:center}
.grat-stat .gv{font-size:28px;font-weight:800;font-family:var(--mono)}
.grat-stat .gl{font-size:10px;color:var(--sub);margin-top:2px}
</style>
</head>
<body>
<div class="header"><div style="display:flex;align-items:center"><h1>Habits</h1><span class="score-badge" id="headerBadge" style="display:none"></span></div><div class="date-nav"><button id="prevDay">&#8249;</button><button class="date-label today" id="dateLabel">Aujourd'hui</button><button id="nextDay" disabled>&#8250;</button></div></div>
<div class="content">
  <div class="tab-content active" id="tab-score"><div id="weekSummary"></div><div id="protBar"></div><div class="score-ring"><svg width="120" height="120" viewBox="0 0 120 120"><circle cx="60" cy="60" r="52" fill="none" stroke="#252525" stroke-width="8"/><circle id="scoreArc" cx="60" cy="60" r="52" fill="none" stroke="var(--accent)" stroke-width="8" stroke-dasharray="0 327" stroke-linecap="round" transform="rotate(-90 60 60)" style="transition:all .5s"/></svg><div style="position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center" id="scoreCenter"><div class="score-num" id="scoreNum">0</div><div class="score-den" id="scoreDen">/8</div></div><div class="perfect" id="perfectMsg" style="display:none">&#10024; Parfait !</div></div><div class="criteria-list" id="criteriaList"></div><div style="text-align:center;margin-top:16px"><button id="editHabitsBtn" style="background:none;border:1px solid var(--border);border-radius:10px;color:var(--sub);padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">&#9998; Modifier les habitudes</button></div></div>
  <div class="tab-content" id="tab-sleep"><div class="sleep-dur" id="sleepDurBlock" style="display:none"><div class="val" id="sleepDurVal"></div><div class="avg" id="sleepAvg"></div></div><div id="sleepPH" style="text-align:center;margin-bottom:28px;color:var(--sub);font-size:14px">Rentre ton coucher et lever</div><div class="time-row"><div><label>COUCHER</label><input type="time" id="bedtime"></div><div><label>LEVER</label><input type="time" id="waketime"></div></div><div class="card" style="margin-bottom:20px"><div class="card-title">QUALITE</div><div class="quality-row" id="qualityRow"></div></div><div class="card"><div class="card-title">7 DERNIERS JOURS</div><div class="bar-chart" id="sleepBars"></div></div></div>
  <div class="tab-content" id="tab-meals"><div class="macros-row" id="macroRings"></div><div class="secondary-macros" id="secondaryMacros"></div><div class="meal-input"><input type="text" id="mealInput" placeholder="200g poulet, riz, brocoli..."><button id="mealBtn">&rarr;</button></div><div id="mealsList"></div></div>
  <div class="tab-content" id="tab-gratitude"><div id="gratContent"></div></div>
  <div class="tab-content" id="tab-heatmap"><div class="stats-row" id="heatmapStats"></div><div class="card" style="padding:16px"><div class="heatmap-grid" id="heatmapGrid"></div><div class="legend" id="heatmapLegend"></div></div><div class="streak-msg" id="streakMsg" style="display:none"></div></div>
  <div class="tab-content" id="tab-insights"><div class="insights" id="insightsContent"></div></div>
</div>
<div class="tabbar" id="tabbar"></div><div id="modalRoot"></div>
<script>
const DEF_C=[{id:"sport",emoji:"\uD83C\uDFCB\uFE0F",label:"Muscu / Sport"},{id:"nutrition",emoji:"\uD83C\uDF57",label:"Bien manger"},{id:"dev",emoji:"\uD83D\uDCBB",label:"Dev GONI"},{id:"sleep7h",emoji:"\uD83D\uDE34",label:"7h+ sommeil"},{id:"social",emoji:"\uD83E\uDD1D",label:"Voir du monde"},{id:"noscroll",emoji:"\uD83D\uDCF5",label:"Pas de scroll"},{id:"water",emoji:"\uD83D\uDCA7",label:"2L+ eau"},{id:"learn",emoji:"\uD83D\uDCDA",label:"Lire / apprendre"}];
const HK="dailyhub-habits",TC=2600,TP=160,GK="dailyhub-gratitudes";
function gC(){try{const r=localStorage.getItem(HK);return r?JSON.parse(r):DEF_C}catch(e){return DEF_C}}
function sC(h){localStorage.setItem(HK,JSON.stringify(h))}
function gG(){try{return JSON.parse(localStorage.getItem(GK))||{}}catch(e){return{}}}
function sG(g){localStorage.setItem(GK,JSON.stringify(g))}

const TABS=[{id:"score",label:"Score",icon:"\uD83C\uDFAF"},{id:"sleep",label:"Sommeil",icon:"\uD83D\uDCA4"},{id:"meals",label:"Repas",icon:"\uD83C\uDF7D\uFE0F"},{id:"gratitude",label:"Gratitude",icon:"\uD83C\uDF1F"},{id:"heatmap",label:"Map",icon:"\uD83D\uDFE9"},{id:"insights",label:"Stats",icon:"\uD83D\uDCCA"}];
const TOD=new Date().toISOString().slice(0,10),LK="dailyhub-days";
let days=JSON.parse(localStorage.getItem(LK)||"{}"),cD=TOD,cT="score";
function sD(){localStorage.setItem(LK,JSON.stringify(days))}
function gD(d){return days[d]||{}}
function pD(d,data){days[d]={...gD(d),...data};sD()}
function sHex(p){return p>=.75?"#e8734a":p>=.5?"#eab308":"#ef4444"}

function updateNav(){const t=cD===TOD;const el=document.getElementById("dateLabel");if(t){el.textContent="Aujourd'hui";el.classList.add("today")}else{const d=new Date(cD+"T12:00:00");el.textContent=d.toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"});el.classList.remove("today")}document.getElementById("nextDay").disabled=t;document.getElementById("nextDay").style.color=t?"#222":"var(--sub)"}
document.getElementById("prevDay").onclick=()=>{const d=new Date(cD);d.setDate(d.getDate()-1);cD=d.toISOString().slice(0,10);updateNav();rT()};
document.getElementById("nextDay").onclick=()=>{const d=new Date(cD);d.setDate(d.getDate()+1);if(d<=new Date()){cD=d.toISOString().slice(0,10);updateNav();rT()}};
document.getElementById("dateLabel").onclick=()=>{cD=TOD;updateNav();rT()};

function buildTB(){const tb=document.getElementById("tabbar");tb.innerHTML=TABS.map(t=>'<button data-tab="'+t.id+'" class="'+(t.id===cT?"active":"")+'"><span class="icon">'+t.icon+'</span><span class="tlabel">'+t.label+'</span></button>').join("");tb.querySelectorAll("button").forEach(b=>{b.onclick=()=>{cT=b.dataset.tab;swT();rT()}})}
function swT(){document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));document.getElementById("tab-"+cT)?.classList.add("active");document.querySelectorAll(".tabbar button").forEach(b=>{b.classList.toggle("active",b.dataset.tab===cT)});uBadge()}
function uBadge(){const badge=document.getElementById("headerBadge");const d=gD(cD);const s=d.score||0;const c=gC();if(s>0&&cT!=="score"){badge.style.display="inline";badge.textContent=s+"/"+c.length}else badge.style.display="none"}

function rWeek(){const el=document.getElementById("weekSummary");const c=gC();const td=new Date(cD+"T12:00:00");const dow=td.getDay();const mon=new Date(td);mon.setDate(td.getDate()-((dow+6)%7));const L=["L","M","M","J","V","S","D"];let h='<div class="week-grid">',tot=0,cnt=0;
for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);const k=d.toISOString().slice(0,10);const s=days[k]?.score||0;const isT=k===cD;const co=s===0?"var(--dim)":sHex(s/c.length);if(s>0){tot+=s;cnt++}h+='<div class="week-day'+(isT?" today-d":"")+'"><div class="dl">'+L[i]+'</div><div class="ds" style="color:'+co+'">'+(s>0?s:"\u00B7")+'</div></div>'}
h+='</div>';if(cnt>0){const a=(tot/cnt).toFixed(1);h+='<div class="week-avg">Moy : <span style="color:var(--text);font-weight:700">'+a+'/'+c.length+'</span></div>'}el.innerHTML=h}

function rProt(){const el=document.getElementById("protBar");const d=gD(cD);const m=d.meals||[];const p=m.reduce((s,x)=>s+(x.protein||0),0);if(!p&&!m.length){el.innerHTML="";return}const pct=Math.min(p/TP,1);const c=pct>=1?"var(--green)":pct>=.6?"var(--blue)":"var(--red)";el.innerHTML='<div class="prot-bar-bg"><div class="prot-bar-fill" style="width:'+Math.round(pct*100)+'%;background:'+c+'"></div></div><div class="prot-label"><span>\uD83C\uDF57 '+p+'g prot</span><span>/ '+TP+'g</span></div>'}

function rScore(){const c=gC();const d=gD(cD);const ch=d.checks||{};
try{const sync=localStorage.getItem("ppl-hub-sync");if(sync===cD&&!ch.sport){ch.sport=true;const s2=Object.keys(ch).filter(k=>ch[k]&&c.some(x=>x.id===k)).length;pD(cD,{checks:ch,score:s2})}}catch(e){}
const s=Object.keys(ch).filter(k=>ch[k]&&c.some(x=>x.id===k)).length;const p=s/c.length;
document.getElementById("scoreArc").setAttribute("stroke-dasharray",p*327+" 327");document.getElementById("scoreArc").setAttribute("stroke",sHex(p));document.getElementById("scoreNum").textContent=s;document.getElementById("scoreNum").style.color=sHex(p);document.getElementById("scoreDen").textContent="/"+c.length;document.getElementById("perfectMsg").style.display=s===c.length?"block":"none";
document.querySelector(".score-ring").style.position="relative";document.getElementById("scoreCenter").style.position="absolute";
const list=document.getElementById("criteriaList");list.innerHTML=c.map(x=>{const on=ch[x.id];return'<div class="criterion '+(on?"on":"")+'" data-id="'+x.id+'"><span class="emoji">'+x.emoji+'</span><span class="label">'+x.label+'</span><div class="check">&#10003;</div></div>'}).join("");
list.querySelectorAll(".criterion").forEach(el=>{el.onclick=()=>{const id=el.dataset.id;const ch2=d.checks||{};ch2[id]=!ch2[id];const s2=Object.keys(ch2).filter(k=>ch2[k]&&c.some(x=>x.id===k)).length;pD(cD,{checks:ch2,score:s2});try{navigator.vibrate(ch2[id]?30:15)}catch(e){}rScore();uBadge()}});
rWeek();rProt()}

document.getElementById("editHabitsBtn").onclick=()=>{const root=document.getElementById("modalRoot");const bg=document.createElement("div");bg.className="modal-bg";const m=document.createElement("div");m.className="modal";
m.innerHTML='<h2>Modifier les habitudes</h2><div id="hl"></div><div class="add-row"><input id="nE" placeholder="\uD83C\uDF1F" style="max-width:50px;text-align:center"><input id="nL" placeholder="Nouvelle habitude..."><button id="aB">+</button></div><div style="margin-top:16px;display:flex;gap:8px"><button id="rB" style="flex:1;padding:12px;border-radius:10px;border:1px solid var(--border);background:none;color:var(--sub);font-size:13px;cursor:pointer;font-family:inherit">Reset</button><button id="cB" style="flex:1;padding:12px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">Fermer</button></div>';
bg.appendChild(m);root.appendChild(bg);bg.onclick=e=>{if(e.target===bg){root.innerHTML="";rScore()}};
function rHL(){const c=gC();m.querySelector("#hl").innerHTML=c.map((h,i)=>'<div class="h-item"><span class="he">'+h.emoji+'</span><span class="hl">'+h.label+'</span><button class="hd" data-i="'+i+'">\u00D7</button></div>').join("");m.querySelectorAll(".hd").forEach(b=>{b.onclick=()=>{const a=gC();a.splice(+b.dataset.i,1);sC(a);rHL()}})}rHL();
m.querySelector("#aB").onclick=()=>{const e=m.querySelector("#nE").value.trim()||"\u2B50";const l=m.querySelector("#nL").value.trim();if(!l)return;const a=gC();a.push({id:"c_"+Date.now(),emoji:e,label:l});sC(a);m.querySelector("#nE").value="";m.querySelector("#nL").value="";rHL()};
m.querySelector("#rB").onclick=()=>{localStorage.removeItem(HK);rHL()};

function rSleep(){const d=gD(cD);const bed=document.getElementById("bedtime");const wake=document.getElementById("waketime");bed.value=d.bedtime||"";wake.value=d.waketime||"";
function calc(b,w){if(!b||!w)return null;const[bh,bm]=b.split(":").map(Number);const[wh,wm]=w.split(":").map(Number);let m=(wh*60+wm)-(bh*60+bm);if(m<0)m+=1440;return+(m/60).toFixed(1)}
function sv(){const b=bed.value,w=wake.value;pD(cD,{bedtime:b,waketime:w,sleepDuration:calc(b,w)});rSD()}
bed.onchange=sv;wake.onchange=sv;
const q=d.sleepQuality||0;const qr=document.getElementById("qualityRow");qr.innerHTML=[1,2,3,4,5].map(n=>'<button class="quality-btn '+(q>=n?"on":"off")+'" data-q="'+n+'">'+n+'</button>').join("");qr.querySelectorAll("button").forEach(b=>{b.onclick=()=>{pD(cD,{sleepQuality:+b.dataset.q});rSleep()}});rSD()}
function rSD(){const d=gD(cD);const dur=d.sleepDuration;const bl=document.getElementById("sleepDurBlock");const ph=document.getElementById("sleepPH");
if(dur){bl.style.display="block";ph.style.display="none";const c=dur>=7?"var(--green)":dur>=6?"var(--yellow)":"var(--red)";document.getElementById("sleepDurVal").textContent=dur+"h";document.getElementById("sleepDurVal").style.color=c;
const l=[];for(let i=0;i<7;i++){const x=new Date(cD);x.setDate(x.getDate()-i);const k=x.toISOString().slice(0,10);if(days[k]?.sleepDuration)l.push(days[k].sleepDuration)}const a=l.length?(l.reduce((a,b)=>a+b,0)/l.length).toFixed(1):null;
document.getElementById("sleepAvg").innerHTML=a?'Moy 7j : <span style="color:var(--text);font-weight:600">'+a+'h</span>':""
}else{bl.style.display="none";ph.style.display="block"}
const bars=document.getElementById("sleepBars");let html="";for(let i=6;i>=0;i--){const x=new Date(cD);x.setDate(x.getDate()-i);const k=x.toISOString().slice(0,10);const hh=days[k]?.sleepDuration||0;const bH=hh?Math.max(8,(hh/10)*80):4;const c=hh>=7?"var(--green)":hh>=6?"var(--yellow)":hh>0?"var(--red)":"#1a1a1a";const dl=["D","L","M","M","J","V","S"][x.getDay()];html+='<div class="bar-col"><div class="val">'+(hh>0?hh:"")+'</div><div class="bar" style="height:'+bH+'px;background:'+c+'"></div><div class="day '+(k===cD?"active":"")+'">'+dl+'</div></div>'}bars.innerHTML=html}

function rMeals(){const d=gD(cD);const ml=d.meals||[];const tC=ml.reduce((s,m)=>s+(m.calories||0),0);const tP=ml.reduce((s,m)=>s+(m.protein||0),0);const tCa=ml.reduce((s,m)=>s+(m.carbs||0),0);const tF=ml.reduce((s,m)=>s+(m.fat||0),0);
const cP=Math.min(tC/TC,1);const pP=Math.min(tP/TP,1);
function ring(sz,pc,co,v,l){const r=(sz/2)-6,ci=2*Math.PI*r;return'<div class="macro-ring card"><div style="position:relative;width:'+sz+'px;height:'+sz+'px"><svg width="'+sz+'" height="'+sz+'" viewBox="0 0 '+sz+' '+sz+'"><circle cx="'+sz/2+'" cy="'+sz/2+'" r="'+r+'" fill="none" stroke="#252525" stroke-width="6"/><circle cx="'+sz/2+'" cy="'+sz/2+'" r="'+r+'" fill="none" stroke="'+co+'" stroke-width="6" stroke-dasharray="'+pc*ci+' '+ci+'" stroke-linecap="round" transform="rotate(-90 '+sz/2+' '+sz/2+')" style="transition:all .5s"/></svg><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center"><span class="val" style="color:'+co+'">'+v+'</span></div></div><div class="label">'+l+'</div></div>'}
document.getElementById("macroRings").innerHTML=ring(80,cP,sHex(cP),tC,"/ "+TC+" KCAL")+ring(80,pP,"#60a5fa",tP+"g","/ "+TP+"g PROT");
document.getElementById("secondaryMacros").innerHTML=[{l:"Glucides",v:tCa,c:"var(--yellow)"},{l:"Lipides",v:tF,c:"var(--red)"}].map(m=>'<div style="text-align:center"><div class="m-val" style="color:'+m.c+'">'+m.v+'g</div><div class="m-label">'+m.l+'</div></div>').join("");
const mls=document.getElementById("mealsList");
if(!ml.length)mls.innerHTML='<div class="empty">Decris ton repas &rarr; IA estime les macros</div>';
else{mls.innerHTML=ml.map(m=>'<div class="meal-item card" style="margin-bottom:6px"><div class="info"><div class="name">'+m.name+'</div><div class="macros">'+m.calories+'kcal \u00B7 P'+m.protein+' \u00B7 G'+m.carbs+' \u00B7 L'+m.fat+'</div></div><button class="del" data-id="'+m.id+'">\u2715</button></div>').join("");
mls.querySelectorAll(".del").forEach(b=>{b.onclick=()=>{const nm=ml.filter(m=>m.id!==+b.dataset.id);pD(cD,{meals:nm});rMeals();rProt()}})}
document.getElementById("mealInput").onkeydown=e=>{if(e.key==="Enter")aMeal()};document.getElementById("mealBtn").onclick=aMeal}
async function aMeal(){const inp=document.getElementById("mealInput");const btn=document.getElementById("mealBtn");const txt=inp.value.trim();if(!txt)return;btn.disabled=true;btn.textContent="\u23F3";
try{const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:'Tu es nutritionniste. Reponds UNIQUEMENT en JSON: {"name":"nom court","calories":number,"protein":number,"carbs":number,"fat":number}. Grammes pour macros. Pas de backticks.',messages:[{role:"user",content:txt}]})});
const data=await res.json();const raw=data.content?.[0]?.text||"";const parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());
const d=gD(cD);const ml=[...(d.meals||[]),{...parsed,id:Date.now(),raw:txt}];pD(cD,{meals:ml});inp.value="";rMeals();rProt()}catch(e){console.error(e)}btn.disabled=false;btn.textContent="\u2192"}

/* ═══════════ GRATITUDE ═══════════ */
function rGratitude(){
  const el=document.getElementById("gratContent");
  const all=gG();
  const todayG=all[cD]||"";
  const allEntries=Object.entries(all).filter(([,v])=>v.trim()).sort(([a],[b])=>b.localeCompare(a));
  const totalG=allEntries.length;

  // Streak gratitude
  let gStreak=0;const td=new Date(cD);
  for(let i=0;i<365;i++){const d=new Date(td);d.setDate(td.getDate()-i);const k=d.toISOString().slice(0,10);if(all[k]?.trim()){gStreak++}else{if(i===0)continue;break}}

  let h='';

  // Stats
  h+='<div class="grat-stat-row">';
  h+='<div class="grat-stat"><div class="gv" style="color:var(--accent)">'+totalG+'</div><div class="gl">gratitudes</div></div>';
  h+='<div class="grat-stat"><div class="gv" style="color:var(--yellow)">'+gStreak+'</div><div class="gl">streak</div></div>';
  h+='</div>';

  // Today's gratitude
  h+='<div class="grat-today">';
  if(todayG&&!el._editing){
    h+='<div class="grat-saved"><div class="gs-icon">\u2728</div><div class="gs-text">'+esc(todayG)+'</div><button class="gs-edit" onclick="startEditGrat()">\u270E</button></div>';
  } else {
    h+='<textarea class="grat-textarea" id="gratText" placeholder="Aujourd\'hui je suis reconnaissant pour...">'+esc(todayG)+'</textarea>';
    h+='<button class="grat-save" id="gratSaveBtn">Enregistrer</button>';
  }
  h+='</div>';

  // Random button
  if(totalG>=2){
    h+='<div class="grat-random-wrap">';
    h+='<button class="grat-random-btn" id="gratRandomBtn">\uD83C\uDFB2 Gratitude aléatoire</button>';
    h+='<div id="gratRandomResult"></div>';
    h+='</div>';
  }

  // History (last 10)
  if(allEntries.length>0){
    const show=allEntries.filter(([k])=>k!==cD).slice(0,10);
    if(show.length){
      h+='<div class="grat-history card">';
      h+='<div class="card-title">\uD83D\uDCDD DERNIERES GRATITUDES</div>';
      show.forEach(([k,v])=>{
        const d=new Date(k+"T12:00:00");
        const dl=d.toLocaleDateString("fr-FR",{day:"numeric",month:"short"});
        h+='<div class="grat-hist-item"><div class="grat-hist-date">'+dl+'</div><div class="grat-hist-text">'+esc(v)+'</div></div>';
      });
      h+='</div>';
    }
  }

  el.innerHTML=h;
  el._editing=false;

  // Bind save
  const saveBtn=document.getElementById("gratSaveBtn");
  if(saveBtn){
    saveBtn.onclick=()=>{
      const txt=document.getElementById("gratText").value.trim();
      if(!txt){saveBtn.disabled=true;return}
      const g=gG();g[cD]=txt;sG(g);
      try{navigator.vibrate(30)}catch(e){}
      rGratitude();
    };
    const ta=document.getElementById("gratText");
    if(ta)ta.oninput=()=>{saveBtn.disabled=!ta.value.trim()};
  }

  // Bind random
  const randBtn=document.getElementById("gratRandomBtn");
  if(randBtn){
    randBtn.onclick=()=>{
      const pool=allEntries.filter(([k])=>k!==cD);
      if(!pool.length)return;
      const [rk,rv]=pool[Math.floor(Math.random()*pool.length)];
      const d=new Date(rk+"T12:00:00");
      const dl=d.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});
      document.getElementById("gratRandomResult").innerHTML='<div class="grat-random-card"><div class="gr-date">'+dl+'</div><div class="gr-text">'+esc(rv)+'</div></div>';
      try{navigator.vibrate(15)}catch(e){}
    };
  }
}

function startEditGrat(){
  const el=document.getElementById("gratContent");
  el._editing=true;
  rGratitude();
  // Focus textarea
  setTimeout(()=>{const ta=document.getElementById("gratText");if(ta){ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length)}},50);
}

window.startEditGrat=startEditGrat;

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>")}

function rHeatmap(){const c=gC();const td=new Date();const cells=[];for(let i=89;i>=0;i--){const d=new Date(td);d.setDate(d.getDate()-i);const k=d.toISOString().slice(0,10);cells.push({date:k,score:days[k]?.score||0})}
function gc(s){return s===0?"#161616":s<=2?"#2d1a0e":s<=4?"#5c3420":s<=6?"#a15430":"#e8734a"}
const half=Math.ceil(c.length/2);let streak=0;for(let i=0;i<=89;i++){const d=new Date(td);d.setDate(d.getDate()-i);const k=d.toISOString().slice(0,10);if(days[k]?.score>=half)streak++;else break}
let best=0,cur=0;cells.forEach(x=>{if(x.score>=half){cur++;best=Math.max(best,cur)}else cur=0});
const logged=Object.values(days).filter(d=>d.score>0);const avg=logged.length?(logged.reduce((s,d)=>s+(d.score||0),0)/logged.length).toFixed(1):"\u2014";
document.getElementById("heatmapStats").innerHTML=[{val:streak,label:"Streak",color:"var(--accent)"},{val:best,label:"Record",color:"var(--yellow)"},{val:avg,label:"Moyenne",color:"var(--blue)"},{val:logged.length,label:"Jours",color:"#a78bfa"}].map(s=>'<div class="stat"><div class="val" style="color:'+s.color+'">'+s.val+'</div><div class="label">'+s.label+'</div></div>').join("");
document.getElementById("heatmapGrid").innerHTML=cells.map(x=>'<div class="heatmap-cell'+(x.date===TOD?" today-cell":"")+'" style="background:'+gc(x.score)+';border:1px solid rgba(37,37,37,.3)"></div>').join("");
document.getElementById("heatmapLegend").innerHTML='<span>0</span>'+[0,2,4,6,8].map(s=>'<div class="box" style="background:'+gc(s)+'"></div>').join("")+'<span>'+c.length+'</span>';
const sm=document.getElementById("streakMsg");if(streak>=3){sm.style.display="block";sm.textContent="\uD83D\uDD25 "+streak+" jours \u2014 lache rien !"}else sm.style.display="none"}

function rInsights(){const c=gC();const el=document.getElementById("insightsContent");const entries=Object.entries(days).filter(([,d])=>d.score>0);
if(entries.length<3){el.innerHTML='<div style="padding:40px;text-align:center;color:var(--sub)">3 jours minimum pour les insights</div>';return}
let html='<div style="text-align:center;color:var(--sub);font-size:11px;letter-spacing:1.5px;font-weight:600;margin-bottom:14px">BASE SUR '+entries.length+' JOURS</div>';
const ws=entries.filter(([,d])=>d.sleepDuration&&d.score);
if(ws.length>=3){const good=ws.filter(([,d])=>d.sleepDuration>=7);const bad=ws.filter(([,d])=>d.sleepDuration<7);const aG=good.length?(good.reduce((s,[,d])=>s+d.score,0)/good.length).toFixed(1):null;const aB=bad.length?(bad.reduce((s,[,d])=>s+d.score,0)/bad.length).toFixed(1):null;
if(aG&&aB){html+='<div class="card"><div class="card-title">\uD83D\uDCA4 SOMMEIL \u2192 SCORE</div><div class="corr-row"><div style="text-align:center"><div class="corr-val" style="color:var(--green)">'+aG+'</div><div class="corr-label">7h+</div></div><div style="text-align:center"><div class="corr-val" style="color:var(--red)">'+aB+'</div><div class="corr-label">&lt;7h</div></div></div><div class="corr-diff">+'+(aG-aB).toFixed(1)+' pts avec 7h+</div></div>'}}
const wm=entries.filter(([,d])=>d.meals?.length>0&&d.score);
if(wm.length>0){const protDays=wm.filter(([,d])=>d.meals.reduce((s,m)=>s+(m.protein||0),0)>=TP);const rate=Math.round(protDays.length/wm.length*100);const co=rate>=70?"var(--green)":rate>=40?"var(--yellow)":"var(--red)";
html+='<div class="card"><div class="card-title">\uD83C\uDFAF PROTEINES</div><div style="text-align:center"><div class="corr-val" style="color:'+co+'">'+rate+'%</div><div class="corr-label">jours a '+TP+'g+</div></div></div>'}
const counts={};c.forEach(x=>{counts[x.id]=0});entries.forEach(([,d])=>{if(d.checks)Object.entries(d.checks).forEach(([k,v])=>{if(v&&counts[k]!=null)counts[k]++})});
const sorted=Object.entries(counts).sort(([,a],[,b])=>b-a);const bestH=c.find(x=>x.id===sorted[0]?.[0]);const worstH=c.find(x=>x.id===sorted[sorted.length-1]?.[0]);
if(bestH&&worstH)html+='<div class="card"><div class="card-title">\uD83C\uDFC6 HABITUDES</div><div style="display:flex;justify-content:space-around"><div style="text-align:center"><div style="font-size:28px">'+bestH.emoji+'</div><div style="font-size:13px;font-weight:600;color:var(--green)">'+bestH.label+'</div><div style="font-size:11px;color:var(--sub)">'+sorted[0][1]+'/'+entries.length+'</div></div><div style="text-align:center"><div style="font-size:28px">'+worstH.emoji+'</div><div style="font-size:13px;font-weight:600;color:var(--red)">'+worstH.label+'</div><div style="font-size:11px;color:var(--sub)">'+sorted[sorted.length-1][1]+'/'+entries.length+'</div></div></div></div>';
el.innerHTML=html}

function rT(){uBadge();if(cT==="score")rScore();else if(cT==="sleep")rSleep();else if(cT==="meals")rMeals();else if(cT==="gratitude")rGratitude();else if(cT==="heatmap")rHeatmap();else if(cT==="insights")rInsights()}
buildTB();updateNav();rT();
if("serviceWorker"in navigator)navigator.serviceWorker.register("sw.js").catch(()=>{});
let dp;window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();dp=e;const b=document.createElement("button");b.id="installBtn";b.textContent="Installer";b.style.cssText="position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;border:none;border-radius:14px;padding:12px 28px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;z-index:200;box-shadow:0 4px 20px rgba(232,115,74,0.4)";b.onclick=async()=>{if(!dp)return;dp.prompt();await dp.userChoice;dp=null;b.remove()};document.body.appendChild(b)});
window.addEventListener("appinstalled",()=>{const b=document.getElementById("installBtn");if(b)b.remove()});
</script>
