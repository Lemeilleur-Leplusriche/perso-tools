<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a1a">
<link rel="manifest" href="manifest.json">
<title>PPL Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{background:#0a0a1a;color:#e8e8f0;font-family:'JetBrains Mono',monospace;min-height:100vh;overflow-x:hidden}
input[type=number]{-moz-appearance:textfield}input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes prPulse{0%,100%{opacity:1}50%{opacity:.5}}
.card{animation:slideUp .3s ease-out both}.app{max-width:480px;margin:0 auto;padding-bottom:80px;min-height:100vh}
.btn{border:none;border-radius:12px;font-weight:800;cursor:pointer;font-family:inherit}
.pr-badge{background:linear-gradient(135deg,#ff6b4a,#ffd700);color:#000;font-weight:900;font-size:10px;padding:2px 6px;border-radius:4px;margin-left:6px;letter-spacing:1px;animation:prPulse 2s ease-in-out infinite}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#0a0a1aee;backdrop-filter:blur(20px);border-top:1px solid #1a1a3e;display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom));z-index:100}
.nav-btn{flex:1;background:none;border:none;padding:8px 0;display:flex;flex-direction:column;align-items:center;cursor:pointer;gap:2px}
.nav-btn span:first-child{font-size:20px}.nav-label{font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:.5px}
.input-set{background:#0a0a1a;border:1px solid #222;border-radius:8px;color:#fff;padding:7px 6px;font-size:14px;text-align:center;font-family:inherit;font-weight:600;outline:none;width:100%}
.input-set:focus{border-color:var(--accent)}
.timer-overlay{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);display:flex;flex-direction:column;align-items:center;justify-content:center}
.activation{background:#1a1a0a;border:1px dashed #555500;border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:11px;color:#aaaa55}
</style>
</head>

const SK="ppl-v3",todayStr=()=>new Date().toISOString().slice(0,10),fmtDate=d=>{const[y,m,day]=d.split("-");return day+"/"+m};
let S={view:"workout",di:0,cw:null,showT:false,tips:{},selEx:null,ts:90,ti:90,tr:false,tiv:null};
let db={workouts:[],prs:{}};
function loadDB(){try{const r=localStorage.getItem(SK);if(r)db=JSON.parse(r)}catch(e){}}
function saveDB(){try{localStorage.setItem(SK,JSON.stringify(db))}catch(e){}}

function startT(s){clearInterval(S.tiv);S.ts=s;S.ti=s;S.tr=true;S.tiv=setInterval(()=>{if(S.ts>0){S.ts--;render()}else{clearInterval(S.tiv);S.tr=false;try{navigator.vibrate(300)}catch(e){}render()}},1000);render()}
function togT(){if(S.tr){clearInterval(S.tiv);S.tr=false}else if(S.ts>0){S.tr=true;S.tiv=setInterval(()=>{if(S.ts>0){S.ts--;render()}else{clearInterval(S.tiv);S.tr=false;try{navigator.vibrate(300)}catch(e){}render()}},1000)}render()}

function getLS(id){for(let i=db.workouts.length-1;i>=0;i--){const e=db.workouts[i].exercises.find(x=>x.id===id);if(e)return e.sets}return null}
function getCD(id){return db.workouts.filter(w=>w.exercises.some(e=>e.id===id)).map(w=>{const e=w.exercises.find(x=>x.id===id);return{date:fmtDate(w.date),weight:Math.max(...e.sets.map(s=>s.weight)),volume:e.sets.reduce((a,s)=>a+s.weight*s.reps,0)}}).slice(-20)}

function h(t,a,...c){const el=document.createElement(t);if(a)Object.entries(a).forEach(([k,v])=>{if(k==="style"&&typeof v==="object")Object.assign(el.style,v);else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);else if(k==="class")el.className=v;else el.setAttribute(k,v)});c.flat(9).forEach(x=>{if(x==null)return;el.appendChild(typeof x==="string"?document.createTextNode(x):x)});return el}

function render(){
const app=document.getElementById("app");app.innerHTML="";
const day=DAYS[S.di],ac=day.color;
document.documentElement.style.setProperty("--accent",ac);
if(S.showT){app.appendChild(renderTimer());return}
app.appendChild(renderHeader(day,ac));
if(S.view==="active")app.appendChild(renderActive(day,ac));
else if(S.view==="workout")app.appendChild(renderSelect(day,ac));
else if(S.view==="history")app.appendChild(renderHistory());
else if(S.view==="stats")app.appendChild(renderStats(ac));
if(S.view!=="active")app.appendChild(renderNav());
}

function renderHeader(day,ac){
const wk=Math.floor(db.workouts.length/6)+1;
return h("div",{style:{padding:"20px 20px 0",display:"flex",justifyContent:"space-between",alignItems:"center"}},
h("div",{},h("div",{style:{fontSize:"11px",color:"#555",letterSpacing:"3px",textTransform:"uppercase",marginBottom:"4px"}},"PPL x2"),
h("div",{style:{fontSize:"22px",fontWeight:"800",letterSpacing:"-1px",color:S.view==="active"?ac:"#e8e8f0"}},S.view==="active"?S.cw.dayLabel:"Semaine "+wk)),
h("div",{style:{fontSize:"12px",color:"#555",textAlign:"right"}},h("div",{},db.workouts.length+" seances"),h("div",{style:{color:ac,fontWeight:"700"}},"82kg")))
}

function renderTimer(){
const s=S.ts,pct=S.ti>0?(s/S.ti)*100:0,r=54,circ=2*Math.PI*r,off=circ-(pct/100)*circ,done=s===0;
const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");svg.setAttribute("width","180");svg.setAttribute("height","180");svg.style.transform="rotate(-90deg)";
const c1=document.createElementNS("http://www.w3.org/2000/svg","circle");[["cx",90],["cy",90],["r",r],["fill","none"],["stroke","#1a1a2e"],["stroke-width",10]].forEach(([k,v])=>c1.setAttribute(k,v));
const c2=document.createElementNS("http://www.w3.org/2000/svg","circle");[["cx",90],["cy",90],["r",r],["fill","none"],["stroke",done?"#50e88e":"#ff6b4a"],["stroke-width",10],["stroke-linecap","round"],["stroke-dasharray",circ],["stroke-dashoffset",off]].forEach(([k,v])=>c2.setAttribute(k,v));c2.style.transition="stroke-dashoffset 1s linear";
svg.appendChild(c1);svg.appendChild(c2);
const td=h("div",{style:{position:"absolute",inset:"0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"42px",fontWeight:"800",color:done?"#50e88e":"#fff",letterSpacing:"2px"}},Math.floor(s/60)+":"+String(s%60).padStart(2,"0"));
const circle=h("div",{style:{position:"relative",width:"180px",height:"180px",marginBottom:"24px"}});circle.appendChild(svg);circle.appendChild(td);
return h("div",{class:"timer-overlay"},circle,
h("div",{style:{display:"flex",gap:"10px",marginBottom:"24px"}},...[60,90,120,180].map(p=>h("button",{style:{background:S.ti===p?"#ff6b4a":"#1a1a2e",color:"#fff",border:"1px solid #333",borderRadius:"10px",padding:"8px 16px",fontSize:"14px",fontWeight:"600",cursor:"pointer",fontFamily:"inherit"},onClick:()=>{S.showT=true;startT(p)}},p+"s"))),
h("div",{style:{display:"flex",gap:"12px"}},h("button",{style:{background:S.tr?"#333":"#ff6b4a",color:"#fff",border:"none",borderRadius:"12px",padding:"12px 28px",fontSize:"16px",fontWeight:"700",cursor:"pointer",fontFamily:"inherit"},onClick:togT},S.tr?"\u23F8 Pause":"\u25B6 Go"),
h("button",{style:{background:"#1a1a2e",color:"#888",border:"1px solid #333",borderRadius:"12px",padding:"12px 28px",fontSize:"16px",fontWeight:"700",cursor:"pointer",fontFamily:"inherit"},onClick:()=>{clearInterval(S.tiv);S.showT=false;render()}},"Fermer")))
}

function renderActive(day,ac){
const w=S.cw;if(!w)return h("div",{});
const ct=h("div",{style:{padding:"20px"}});
ct.appendChild(h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"16px"}},
h("button",{class:"btn",style:{background:ac,color:"#000",padding:"10px 20px",fontSize:"14px",flex:"1",marginRight:"8px"},onClick:()=>{S.showT=true;startT(S.ti)}},"\u23F1 Timer"),
h("button",{class:"btn",style:{background:"#50e88e",color:"#000",padding:"10px 20px",fontSize:"14px"},onClick:finishW},"\u2713 Terminer")));
if(day.activation)ct.appendChild(h("div",{class:"activation"},"\uD83D\uDD25 "+day.activation));
if(day.note)ct.appendChild(h("div",{style:{background:"#111127",borderRadius:"10px",padding:"10px 14px",marginBottom:"12px",fontSize:"11px",color:"#888",lineHeight:"1.5",border:"1px solid #1a1a3e"}},day.note));
if(day.asymmetry)ct.appendChild(h("div",{style:{background:"linear-gradient(135deg,#ff6b4a11,#ff6b4a08)",border:"1px solid #ff6b4a33",borderRadius:"10px",padding:"10px",marginBottom:"12px",fontSize:"11px",color:"#ff6b4a",lineHeight:"1.5"}},
h("span",{style:{fontWeight:"800"}},"\u26A1 ASYMETRIE LAT GAUCHE")," \u2014 Rowing 1 bras : gauche en premier, meme charge G/D. Focus mental lat gauche sur les tirages."));

w.exercises.forEach((ex,ei)=>{
const last=getLS(ex.id),pr=db.prs[ex.id],tk=ex.id,isA=ex.asymmetry,isP=ex.priority;
const card=h("div",{class:"card",style:{background:isA?"#111120":isP?"#17111a":"#111127",borderRadius:"14px",padding:"14px",marginBottom:"10px",border:isA?"1px solid #ff6b4a33":isP?"1px solid "+ac+"33":"1px solid #1a1a3e",animationDelay:ei*40+"ms"}});
const tr=h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"4px"}});
const nm=h("div",{style:{fontWeight:"700",fontSize:"13px",flex:"1"}},ex.name);
if(pr)nm.appendChild(h("span",{style:{color:"#555",fontSize:"10px",marginLeft:"6px"}},"PR:"+pr.weight+"kg"));
if(isP)nm.appendChild(h("span",{style:{background:ac+"33",color:ac,fontSize:"8px",padding:"1px 5px",borderRadius:"3px",marginLeft:"4px",fontWeight:"800"}},"PRIO"));
tr.appendChild(nm);
tr.appendChild(h("button",{style:{background:S.tips[tk]?"#1a1a3e":"none",border:"1px solid #222",borderRadius:"8px",color:S.tips[tk]?ac:"#444",padding:"3px 7px",fontSize:"10px",cursor:"pointer",fontFamily:"inherit",fontWeight:"700"},onClick:()=>{S.tips[tk]=!S.tips[tk];render()}},S.tips[tk]?"\u2715":"?"));

function startW(){const day=DAYS[S.di];S.cw={dayId:day.id,dayLabel:day.label,date:todayStr(),exercises:day.exercises.map(ex=>{const last=getLS(ex.id);return{...ex,sd:Array.from({length:ex.sets},(_,i)=>{const w=last&&last[i]?String(last[i].weight):ex.dw!=null?String(ex.dw):"";const r=last&&last[i]?String(last[i].reps):"";return{weight:w,reps:r}})}}),startTime:Date.now()};S.view="active";render()}
function finishW(){const w=S.cw;if(!w)return;
const cl={dayId:w.dayId,dayLabel:w.dayLabel,date:w.date,duration:Math.round((Date.now()-w.startTime)/60000),
exercises:w.exercises.map(ex=>({id:ex.id,name:ex.name,sets:ex.sd.filter(s=>s.weight&&s.reps).map(s=>({weight:parseFloat(s.weight),reps:parseInt(s.reps)}))})).filter(ex=>ex.sets.length>0)};
cl.exercises.forEach(ex=>{const mW=Math.max(...ex.sets.map(s=>s.weight)),mV=Math.max(...ex.sets.map(s=>s.weight*s.reps));
if(!db.prs[ex.id]||mW>(db.prs[ex.id].weight||0))db.prs[ex.id]={...(db.prs[ex.id]||{}),weight:mW,weightDate:cl.date};
if(!db.prs[ex.id]||mV>(db.prs[ex.id].volume||0))db.prs[ex.id]={...(db.prs[ex.id]||{}),volume:mV,volumeDate:cl.date}});
db.workouts.push(cl);saveDB();S.cw=null;S.view="workout";render()}
