*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#111;--card:#1a1a1a;--border:#252525;--text:#eee;--sub:#777;--dim:#444;--accent:#e8734a;--accent2:#e8734a22;--green:#4ade80;--blue:#60a5fa;--yellow:#fbbf24}
html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
input[type=number]{-moz-appearance:textfield}input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fi-once{animation:fadeIn .25s ease both}
.app{max-width:430px;margin:0 auto;padding:0 16px 90px}

/* Nav */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;display:flex;background:#111e;backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:6px 0 max(6px,env(safe-area-inset-bottom));z-index:100}
.nav button{flex:1;background:none;border:none;padding:6px 0;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:1px}
.nav button span:first-child{font-size:18px}
.nav button span:last-child{font-size:9px;font-weight:600;letter-spacing:.3px}

/* Timer */
.timer-bg{position:fixed;inset:0;z-index:999;background:#000e;backdrop-filter:blur(16px);display:flex;flex-direction:column;align-items:center;justify-content:center}

return h("div",{cls:"timer-bg"},wrap,
h("div",{style:{display:"flex",gap:"8px",marginBottom:"28px"}},...[60,90,120,180].map(p=>h("button",{style:{background:TI===p?"var(--accent)":"#222",color:"#fff",border:"none",borderRadius:"20px",padding:"10px 18px",fontSize:"15px",fontWeight:"600",cursor:"pointer",fontFamily:"inherit"},onClick:()=>{ST=true;tStart(p)}},p+"s"))),
h("div",{style:{display:"flex",gap:"12px"}},
h("button",{style:{background:TR?"#333":"var(--accent)",color:"#fff",border:"none",borderRadius:"14px",padding:"14px 32px",fontSize:"16px",fontWeight:"700",cursor:"pointer",fontFamily:"inherit"},onClick:tTog},TR?"Pause":"Go"),
h("button",{style:{background:"#222",color:"#888",border:"none",borderRadius:"14px",padding:"14px 32px",fontSize:"16px",fontWeight:"600",cursor:"pointer",fontFamily:"inherit"},onClick:()=>{clearInterval(TV);ST=false;ren()}},"Fermer")))
}

function startW(){
const day=D[DI];
CW={dayId:day.id,dayLabel:day.label,date:td(),ex:day.exercises.map(ex=>{
const last=gLS(ex.id);
return{...ex,sd:Array.from({length:ex.s},(_,i)=>{
const w=last&&last[i]?String(last[i].w):ex.dw!=null?String(ex.dw):"";
const r=last&&last[i]?String(last[i].r):"";return{w,r}})}
}),t0:Date.now()};V="active";ren()}

function finishW(){
if(!CW)return;
const cl={dayId:CW.dayId,dayLabel:CW.dayLabel,date:CW.date,dur:Math.round((Date.now()-CW.t0)/60000),
ex:CW.ex.map(ex=>({id:ex.id,name:ex.name,sets:ex.sd.filter(s=>s.w&&s.r).map(s=>({w:parseFloat(s.w),r:parseInt(s.r)})),r:ex.r})).filter(ex=>ex.sets.length>0)};
cl.ex.forEach(ex=>{
const mW=Math.max(...ex.sets.map(s=>s.w)),mV=Math.max(...ex.sets.map(s=>s.w*s.r));
// 1RM Epley
const best1RM=Math.max(...ex.sets.map(s=>s.r===1?s.w:s.w*(1+s.r/30)));
if(!db.pr[ex.id]||mW>(db.pr[ex.id].wt||0))db.pr[ex.id]={...(db.pr[ex.id]||{}),wt:mW};
if(!db.pr[ex.id]||mV>(db.pr[ex.id].vol||0))db.pr[ex.id]={...(db.pr[ex.id]||{}),vol:mV};
if(!db.pr[ex.id]||best1RM>(db.pr[ex.id].e1rm||0))db.pr[ex.id]={...(db.pr[ex.id]||{}),e1rm:Math.round(best1RM*10)/10};
// Surcharge progressive : si toutes les series atteignent le haut de la fourchette de reps
const repRange=ex.r;
if(repRange&&repRange.includes("-")){
const maxR=parseInt(repRange.split("-")[1]);
const allMaxed=ex.sets.length>0&&ex.sets.every(s=>s.r>=maxR);
if(allMaxed){const curW=Math.max(...ex.sets.map(s=>s.w));db.pr[ex.id].suggest=curW+2;}
else{delete db.pr[ex.id]?.suggest;}
}});
db.w.push(cl);save();CW=null;V="home";ren()}
