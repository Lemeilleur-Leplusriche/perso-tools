<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#111111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Daily Hub</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#111;--card:#1a1a1a;--border:#252525;--text:#eee;--sub:#777;--accent:#e8734a;--green:#22c55e;--yellow:#eab308;--red:#ef4444;--blue:#60a5fa;--radius:14px;--font:'DM Sans',sans-serif;--mono:'DM Mono',monospace}
body{background:var(--bg);color:var(--text);font-family:var(--font);max-width:420px;margin:0 auto;min-height:100vh;min-height:100dvh;overflow-x:hidden}
input[type="time"]::-webkit-calendar-picker-indicator{filter:invert(0.5)}
::selection{background:rgba(232,115,74,0.25)}

.header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 0}
.header h1{font-size:18px;font-weight:800;letter-spacing:-0.5px}
.score-badge{font-size:11px;font-weight:700;font-family:var(--mono);color:var(--accent);background:rgba(232,115,74,0.12);padding:3px 8px;border-radius:6px;margin-left:10px}
.date-nav{display:flex;align-items:center;gap:4px}
.date-nav button{background:none;border:none;color:var(--sub);font-size:20px;cursor:pointer;padding:4px 10px;line-height:1}
.date-nav button:disabled{color:#222;cursor:default}
.date-label{font-size:12px;font-weight:600;font-family:var(--mono);min-width:100px;text-align:center;color:var(--sub);background:none;border:none;cursor:pointer}
.date-label.today{color:var(--accent)}

.content{padding:12px 14px 100px;overflow-y:auto}
.tab-content{display:none}.tab-content.active{display:block}

/* Score ring */
.score-ring{text-align:center;margin:24px 0 28px}
.score-num{font-size:40px;font-weight:800;font-family:var(--mono);line-height:1}
.score-den{font-size:12px;color:var(--sub);letter-spacing:2px}
.perfect{margin-top:12px;font-size:13px;color:var(--accent);font-weight:600;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

.criteria-list{display:flex;flex-direction:column;gap:6px}
.criterion{display:flex;align-items:center;gap:14px;padding:15px 16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--card);cursor:pointer;transition:all .25s ease;font-size:15px;color:var(--sub);-webkit-user-select:none;user-select:none}
.criterion.on{background:rgba(232,115,74,0.08);border-color:rgba(232,115,74,0.2);color:var(--text)}
.criterion .emoji{font-size:22px;width:30px;text-align:center;transition:transform .2s}
.criterion.on .emoji{transform:scale(1.15)}
.criterion .label{flex:1;text-align:left;font-weight:500}
.criterion .check{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:#252525;color:transparent;font-weight:800;font-size:13px;transition:all .25s}
.criterion.on .check{background:var(--accent);color:#000}

/* Sleep */
.sleep-dur{text-align:center;margin-bottom:28px}
.sleep-dur .val{font-size:56px;font-weight:800;font-family:var(--mono);line-height:1}
.sleep-dur .avg{color:var(--sub);font-size:13px;margin-top:8px}
.time-row{display:flex;gap:12px;margin-bottom:20px}
.time-row>div{flex:1}
.time-row label{color:var(--sub);font-size:11px;letter-spacing:1.5px;display:block;margin-bottom:8px;font-weight:600}
.time-row input{width:100%;padding:14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--card);color:var(--text);font-size:18px;font-family:var(--mono);outline:none}
.card{background:var(--card);border-radius:var(--radius);padding:18px;border:1px solid var(--border)}
.card-title{font-size:11px;color:var(--sub);letter-spacing:1.5px;margin-bottom:10px;font-weight:600}
.quality-row{display:flex;gap:8px;justify-content:center}
.quality-btn{width:44px;height:44px;border-radius:10px;border:none;font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;font-family:var(--mono)}
.quality-btn.off{background:#1a1a1a;color:var(--sub)}
.quality-btn.on{background:var(--accent);color:#000}
.bar-chart{display:flex;gap:6px;align-items:flex-end;height:80px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar-col .val{font-size:9px;color:var(--sub);font-family:var(--mono)}
.bar-col .bar{width:100%;border-radius:4px;transition:all .3s}
.bar-col .day{font-size:10px;color:var(--sub)}
.bar-col .day.active{color:var(--text);font-weight:700}

/* Meals */
.macros-row{display:flex;gap:12px;margin-bottom:24px}
.macro-ring{flex:1;display:flex;flex-direction:column;align-items:center;padding:16px}
.macro-ring .label{font-size:10px;color:var(--sub);margin-top:6px;letter-spacing:1px}
.macro-ring .val{font-size:16px;font-weight:800;font-family:var(--mono)}
.secondary-macros{display:flex;justify-content:center;gap:24px;margin-bottom:24px}
.secondary-macros .m-val{font-size:20px;font-weight:700;font-family:var(--mono)}
.secondary-macros .m-label{font-size:10px;color:var(--sub);margin-top:2px}
.meal-input{display:flex;gap:8px;margin-bottom:20px}
.meal-input input{flex:1;padding:14px 16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--card);color:var(--text);font-size:14px;font-family:var(--font);outline:none}
.meal-input button{padding:14px 20px;border-radius:var(--radius);border:none;background:var(--accent);color:#000;font-weight:700;cursor:pointer;font-size:16px;transition:all .2s}
.meal-input button:disabled{background:#252525;cursor:wait}
.meal-item{display:flex;align-items:center;gap:12px;padding:12px 14px}
.meal-item .info{flex:1}
.meal-item .name{color:var(--text);font-size:14px;font-weight:600}
.meal-item .macros{color:var(--sub);font-size:12px;margin-top:3px;font-family:var(--mono)}
.meal-item .del{background:none;border:none;color:#333;cursor:pointer;font-size:18px;padding:4px}
.empty{text-align:center;color:#333;font-size:13px;padding:28px}

/* Heatmap */
.stats-row{display:flex;justify-content:center;gap:20px;margin-bottom:28px}
.stat{text-align:center}
.stat .emoji{font-size:11px;margin-bottom:4px}
.stat .val{font-size:24px;font-weight:800;font-family:var(--mono)}
.stat .label{font-size:10px;color:var(--sub);margin-top:2px;letter-spacing:.5px}
.heatmap-grid{display:grid;grid-template-columns:repeat(13,1fr);gap:3px}
.heatmap-cell{aspect-ratio:1;border-radius:3px;transition:all .2s}
.heatmap-cell.today-cell{border:1.5px solid var(--text)!important}
.legend{display:flex;align-items:center;justify-content:center;gap:4px;margin-top:12px}
.legend span{font-size:9px;color:var(--sub)}
.legend .box{width:12px;height:12px;border-radius:2px}
.streak-msg{text-align:center;margin-top:20px;font-size:14px;color:var(--accent);font-weight:600}

/* Insights */
.insights{display:flex;flex-direction:column;gap:14px}
.insight-header{text-align:center;color:var(--sub);font-size:11px;letter-spacing:1.5px;font-weight:600}
.corr-row{display:flex;justify-content:space-around}
.corr-val{font-size:32px;font-weight:800;font-family:var(--mono)}
.corr-label{font-size:11px;color:var(--sub)}
.corr-diff{text-align:center;margin-top:12px;font-size:13px;color:#aaa;font-weight:500}
.habit-row{display:flex;justify-content:space-around}
.habit-item{text-align:center}
.habit-item .emoji{font-size:32px;margin-bottom:4px}
.habit-item .name{font-size:13px;font-weight:600}
.habit-item .count{font-size:11px;color:var(--sub)}

/* Tab bar */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:rgba(17,17,17,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;padding:6px 0 14px;z-index:10}
.tabbar button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;color:#333;transition:all .2s;padding:6px 0}
.tabbar button.active{color:var(--accent)}
.tabbar button .icon{font-size:18px;transition:transform .2s}
.tabbar button.active .icon{transform:scale(1.1)}
.tabbar button .tlabel{font-size:9px;font-weight:700;letter-spacing:.5px}
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center">
    <h1>Daily Hub</h1>
    <span class="score-badge" id="headerBadge" style="display:none"></span>
  </div>
  <div class="date-nav">
    <button id="prevDay">‹</button>
    <button class="date-label today" id="dateLabel">Aujourd'hui</button>
    <button id="nextDay" disabled>›</button>
  </div>
</div>

<div class="content">
  <!-- SCORE -->
  <div class="tab-content active" id="tab-score">
    <div class="score-ring">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="52" fill="none" stroke="#252525" stroke-width="8"/>
        <circle id="scoreArc" cx="60" cy="60" r="52" fill="none" stroke="var(--accent)" stroke-width="8" stroke-dasharray="0 327" stroke-linecap="round" transform="rotate(-90 60 60)" style="transition:all .5s ease"/>
      </svg>
      <div style="position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center" id="scoreCenter">
        <div class="score-num" id="scoreNum">0</div>
        <div class="score-den">/8</div>
      </div>
      <div class="perfect" id="perfectMsg" style="display:none">✨ Journée parfaite !</div>
    </div>
    <div class="criteria-list" id="criteriaList"></div>
  </div>

  <!-- SLEEP -->
  <div class="tab-content" id="tab-sleep">
    <div class="sleep-dur" id="sleepDurBlock" style="display:none">
      <div class="val" id="sleepDurVal"></div>
      <div class="avg" id="sleepAvg"></div>
    </div>
    <div id="sleepPlaceholder" style="text-align:center;margin-bottom:28px;color:var(--sub);font-size:14px">Rentre ton coucher et lever</div>
    <div class="time-row">
      <div><label>COUCHER</label><input type="time" id="bedtime"></div>
      <div><label>LEVER</label><input type="time" id="waketime"></div>
    </div>
    <div class="card" style="margin-bottom:20px">
      <div class="card-title">QUALITÉ RESSENTIE</div>
      <div class="quality-row" id="qualityRow"></div>
    </div>
    <div class="card">
      <div class="card-title">7 DERNIERS JOURS</div>
      <div class="bar-chart" id="sleepBars"></div>
    </div>
  </div>

  <!-- MEALS -->
  <div class="tab-content" id="tab-meals">
    <div class="macros-row" id="macroRings"></div>
    <div class="secondary-macros" id="secondaryMacros"></div>
    <div class="meal-input">
      <input type="text" id="mealInput" placeholder="200g poulet, riz, brocoli...">
      <button id="mealBtn">→</button>
    </div>
    <div id="mealsList"></div>
  </div>

  <!-- HEATMAP -->
  <div class="tab-content" id="tab-heatmap">
    <div class="stats-row" id="heatmapStats"></div>
    <div class="card" style="padding:16px">
      <div class="heatmap-grid" id="heatmapGrid"></div>
      <div class="legend" id="heatmapLegend"></div>
    </div>
    <div class="streak-msg" id="streakMsg" style="display:none"></div>
  </div>

  <!-- INSIGHTS -->
  <div class="tab-content" id="tab-insights">
    <div class="insights" id="insightsContent"></div>
  </div>
</div>

<div class="tabbar" id="tabbar"></div>

<script>
// ─── CONFIG ───
const CRITERIA=[
  {id:"sport",emoji:"🏋️",label:"Muscu / Sport"},
  {id:"nutrition",emoji:"🍗",label:"Bien manger"},
  {id:"dev",emoji:"💻",label:"Dev GONI"},
  {id:"sleep7h",emoji:"😴",label:"7h+ de sommeil"},
  {id:"social",emoji:"🤝",label:"Voir du monde"},
  {id:"noscroll",emoji:"📵",label:"Pas de scroll inutile"},
  {id:"water",emoji:"💧",label:"2L+ d'eau"},
  {id:"learn",emoji:"📚",label:"Lire / apprendre"},
];
const TARGET_CAL=2600,TARGET_PROT=160;
const TABS=[
  {id:"score",label:"Score",icon:"🎯"},
  {id:"sleep",label:"Sommeil",icon:"💤"},
  {id:"meals",label:"Repas",icon:"🍽️"},
  {id:"heatmap",label:"Map",icon:"🟩"},
  {id:"insights",label:"Stats",icon:"📊"},
];
const TODAY=new Date().toISOString().slice(0,10);
const LS_KEY="dailyhub-days";

// ─── STATE ───
let days=JSON.parse(localStorage.getItem(LS_KEY)||"{}");
let currentDate=TODAY;
let currentTab="score";

function saveDays(){localStorage.setItem(LS_KEY,JSON.stringify(days))}
function getDay(d){return days[d]||{}}
function setDay(d,data){days[d]={...getDay(d),...data};saveDays()}
function getScoreColor(pct){return pct>=.75?"var(--accent)":pct>=.5?"var(--yellow)":"var(--red)"}
function getScoreHex(pct){return pct>=.75?"#e8734a":pct>=.5?"#eab308":"#ef4444"}

// ─── DATE NAV ───
function updateDateNav(){
  const isToday=currentDate===TODAY;
  const el=document.getElementById("dateLabel");
  if(isToday){el.textContent="Aujourd'hui";el.classList.add("today")}
  else{
    const d=new Date(currentDate+"T12:00:00");
    el.textContent=d.toLocaleDateString("fr-FR",{weekday:"short",day:"numeric",month:"short"});
    el.classList.remove("today");
  }
  document.getElementById("nextDay").disabled=isToday;
  document.getElementById("nextDay").style.color=isToday?"#222":"var(--sub)";
}
document.getElementById("prevDay").onclick=()=>{
  const d=new Date(currentDate);d.setDate(d.getDate()-1);
  currentDate=d.toISOString().slice(0,10);updateDateNav();renderTab();
};
document.getElementById("nextDay").onclick=()=>{
  const d=new Date(currentDate);d.setDate(d.getDate()+1);
  if(d<=new Date()){currentDate=d.toISOString().slice(0,10);updateDateNav();renderTab();}
};
document.getElementById("dateLabel").onclick=()=>{
  currentDate=TODAY;updateDateNav();renderTab();
};

// ─── TABS ───
function buildTabbar(){
  const tb=document.getElementById("tabbar");
  tb.innerHTML=TABS.map(t=>`
    <button data-tab="${t.id}" class="${t.id===currentTab?"active":""}">
      <span class="icon">${t.icon}</span>
      <span class="tlabel">${t.label}</span>
    </button>`).join("");
  tb.querySelectorAll("button").forEach(b=>{
    b.onclick=()=>{currentTab=b.dataset.tab;switchTab();renderTab();}
  });
}
function switchTab(){
  document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
  document.getElementById("tab-"+currentTab)?.classList.add("active");
  document.querySelectorAll(".tabbar button").forEach(b=>{
    b.classList.toggle("active",b.dataset.tab===currentTab);
  });
  updateHeaderBadge();
}
function updateHeaderBadge(){
  const badge=document.getElementById("headerBadge");
  const day=getDay(currentDate);
  const score=day.score||0;
  if(score>0&&currentTab!=="score"){
    badge.style.display="inline";badge.textContent=score+"/"+CRITERIA.length;
  }else{badge.style.display="none";}
}

// ─── RENDER SCORE ───
function renderScore(){
  const day=getDay(currentDate);
  const checks=day.checks||{};
  const score=Object.values(checks).filter(Boolean).length;
  const pct=score/CRITERIA.length;
  
  // Ring
  document.getElementById("scoreArc").setAttribute("stroke-dasharray",`${pct*327} 327`);
  document.getElementById("scoreArc").setAttribute("stroke",getScoreHex(pct));
  document.getElementById("scoreNum").textContent=score;
  document.getElementById("scoreNum").style.color=getScoreHex(pct);
  document.getElementById("perfectMsg").style.display=score===CRITERIA.length?"block":"none";
  
  // Make ring container relative
  const ring=document.querySelector(".score-ring");
  ring.style.position="relative";
  document.getElementById("scoreCenter").style.position="absolute";

  // Criteria
  const list=document.getElementById("criteriaList");
  list.innerHTML=CRITERIA.map(c=>{
    const on=checks[c.id];
    return `<div class="criterion ${on?"on":""}" data-id="${c.id}">
      <span class="emoji">${c.emoji}</span>
      <span class="label">${c.label}</span>
      <div class="check">✓</div>
    </div>`;
  }).join("");
  list.querySelectorAll(".criterion").forEach(el=>{
    el.onclick=()=>{
      const id=el.dataset.id;
      const c=day.checks||{};
      c[id]=!c[id];
      const s=Object.values(c).filter(Boolean).length;
      setDay(currentDate,{checks:c,score:s});
      renderScore();updateHeaderBadge();
    };
  });
}

// ─── RENDER SLEEP ───
function renderSleep(){
  const day=getDay(currentDate);
  const bed=document.getElementById("bedtime");
  const wake=document.getElementById("waketime");
  bed.value=day.bedtime||"";
  wake.value=day.waketime||"";

  function calcDur(b,w){
    if(!b||!w)return null;
    const[bh,bm]=b.split(":").map(Number);
    const[wh,wm]=w.split(":").map(Number);
    let m=(wh*60+wm)-(bh*60+bm);if(m<0)m+=1440;
    return+(m/60).toFixed(1);
  }
  function saveSleep(){
    const b=bed.value,w=wake.value;
    const dur=calcDur(b,w);
    setDay(currentDate,{bedtime:b,waketime:w,sleepDuration:dur});
    renderSleepDisplay();
  }
  bed.onchange=saveSleep;
  wake.onchange=saveSleep;

  // Quality
  const q=day.sleepQuality||0;
  const qr=document.getElementById("qualityRow");
  qr.innerHTML=[1,2,3,4,5].map(n=>`<button class="quality-btn ${q>=n?"on":"off"}" data-q="${n}">${n}</button>`).join("");
  qr.querySelectorAll("button").forEach(b=>{
    b.onclick=()=>{setDay(currentDate,{sleepQuality:+b.dataset.q});renderSleep();}
  });

  renderSleepDisplay();
}
function renderSleepDisplay(){
  const day=getDay(currentDate);
  const dur=day.sleepDuration;
  const block=document.getElementById("sleepDurBlock");
  const ph=document.getElementById("sleepPlaceholder");
  if(dur){
    block.style.display="block";ph.style.display="none";
    const c=dur>=7?"var(--green)":dur>=6?"var(--yellow)":"var(--red)";
    document.getElementById("sleepDurVal").textContent=dur+"h";
    document.getElementById("sleepDurVal").style.color=c;
    // 7-day avg
    const last7=[];
    for(let i=0;i<7;i++){const d=new Date(currentDate);d.setDate(d.getDate()-i);const k=d.toISOString().slice(0,10);if(days[k]?.sleepDuration)last7.push(days[k].sleepDuration);}
    const avg=last7.length?(last7.reduce((a,b)=>a+b,0)/last7.length).toFixed(1):null;
    document.getElementById("sleepAvg").innerHTML=avg?`Moy. 7j : <span style="color:var(--text);font-weight:600">${avg}h</span>`:"";
  }else{block.style.display="none";ph.style.display="block";}

  // Bar chart
  const bars=document.getElementById("sleepBars");
  let html="";
  for(let i=6;i>=0;i--){
    const d=new Date(currentDate);d.setDate(d.getDate()-i);
    const k=d.toISOString().slice(0,10);
    const h=days[k]?.sleepDuration||0;
    const barH=h?Math.max(8,(h/10)*80):4;
    const c=h>=7?"var(--green)":h>=6?"var(--yellow)":h>0?"var(--red)":"#1a1a1a";
    const dl=["D","L","M","M","J","V","S"][d.getDay()];
    const active=k===currentDate?"active":"";
    html+=`<div class="bar-col"><div class="val">${h>0?h:""}</div><div class="bar" style="height:${barH}px;background:${c}"></div><div class="day ${active}">${dl}</div></div>`;
  }
  bars.innerHTML=html;
}

// ─── RENDER MEALS ───
function renderMeals(){
  const day=getDay(currentDate);
  const meals=day.meals||[];
  const totalCal=meals.reduce((s,m)=>s+(m.calories||0),0);
  const totalP=meals.reduce((s,m)=>s+(m.protein||0),0);
  const totalC=meals.reduce((s,m)=>s+(m.carbs||0),0);
  const totalF=meals.reduce((s,m)=>s+(m.fat||0),0);
  const calPct=Math.min(totalCal/TARGET_CAL,1);
  const protPct=Math.min(totalP/TARGET_PROT,1);

  function ring(size,pct,color,val,label){
    const r=(size/2)-6,circ=2*Math.PI*r;
    return`<div class="macro-ring card"><div style="position:relative;width:${size}px;height:${size}px">
      <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
        <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#252525" stroke-width="6"/>
        <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="6" stroke-dasharray="${pct*circ} ${circ}" stroke-linecap="round" transform="rotate(-90 ${size/2} ${size/2})" style="transition:all .5s"/>
      </svg>
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">
        <span class="val" style="color:${color}">${val}</span>
      </div></div><div class="label">${label}</div></div>`;
  }
  document.getElementById("macroRings").innerHTML=
    ring(80,calPct,getScoreHex(calPct),totalCal,`/ ${TARGET_CAL} KCAL`)+
    ring(80,protPct,"#60a5fa",totalP+"g",`/ ${TARGET_PROT}g PROT`);

  document.getElementById("secondaryMacros").innerHTML=
    [{l:"Glucides",v:totalC,c:"var(--yellow)"},{l:"Lipides",v:totalF,c:"var(--red)"}]
    .map(m=>`<div style="text-align:center"><div class="m-val" style="color:${m.c}">${m.v}g</div><div class="m-label">${m.l}</div></div>`).join("");

  // Meals list
  const ml=document.getElementById("mealsList");
  if(meals.length===0){ml.innerHTML=`<div class="empty">Décris ton repas → l'IA estime les macros</div>`;
  }else{
    ml.innerHTML=meals.map(m=>`<div class="meal-item card" style="margin-bottom:6px">
      <div class="info"><div class="name">${m.name}</div><div class="macros">${m.calories}kcal · P${m.protein} · G${m.carbs} · L${m.fat}</div></div>
      <button class="del" data-id="${m.id}">✕</button></div>`).join("");
    ml.querySelectorAll(".del").forEach(b=>{
      b.onclick=()=>{
        const nm=meals.filter(m=>m.id!==+b.dataset.id);
        setDay(currentDate,{meals:nm});renderMeals();
      };
    });
  }

  // Input
  const inp=document.getElementById("mealInput");
  const btn=document.getElementById("mealBtn");
  inp.onkeydown=e=>{if(e.key==="Enter")analyzeMeal()};
  btn.onclick=analyzeMeal;
}

async function analyzeMeal(){
  const inp=document.getElementById("mealInput");
  const btn=document.getElementById("mealBtn");
  const txt=inp.value.trim();if(!txt)return;
  btn.disabled=true;btn.textContent="⏳";
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",max_tokens:1000,
        system:'Tu es nutritionniste. Réponds UNIQUEMENT en JSON: {"name":"nom court","calories":number,"protein":number,"carbs":number,"fat":number}. Grammes pour macros. Pas de backticks.',
        messages:[{role:"user",content:txt}],
      }),
    });
    const data=await res.json();
    const raw=data.content?.[0]?.text||"";
    const parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());
    const day=getDay(currentDate);
    const meals=[...(day.meals||[]),{...parsed,id:Date.now(),raw:txt}];
    setDay(currentDate,{meals});inp.value="";renderMeals();
  }catch(e){console.error(e)}
  btn.disabled=false;btn.textContent="→";
}

// ─── RENDER HEATMAP ───
function renderHeatmap(){
  const today=new Date();
  const cells=[];
  for(let i=89;i>=0;i--){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const k=d.toISOString().slice(0,10);
    cells.push({date:k,score:days[k]?.score||0});
  }
  function getColor(s){
    if(s===0)return"#161616";if(s<=2)return"#2d1a0e";if(s<=4)return"#5c3420";if(s<=6)return"#a15430";return"#e8734a";
  }
  const half=Math.ceil(CRITERIA.length/2);
  let streak=0;
  for(let i=0;i<=89;i++){
    const d=new Date(today);d.setDate(d.getDate()-i);const k=d.toISOString().slice(0,10);
    if(days[k]?.score>=half)streak++;else break;
  }
  let best=0,cur=0;
  cells.forEach(c=>{if(c.score>=half){cur++;best=Math.max(best,cur)}else cur=0});
  const logged=Object.values(days).filter(d=>d.score>0);
  const avg=logged.length?(logged.reduce((s,d)=>s+(d.score||0),0)/logged.length).toFixed(1):"—";

  document.getElementById("heatmapStats").innerHTML=[
    {val:streak,label:"Streak",color:"var(--accent)",emoji:"🔥"},
    {val:best,label:"Record",color:"var(--yellow)",emoji:"🏆"},
    {val:avg,label:"Moyenne",color:"var(--blue)",emoji:"📊"},
    {val:logged.length,label:"Jours",color:"#a78bfa",emoji:"📅"},
  ].map(s=>`<div class="stat"><div class="emoji">${s.emoji}</div><div class="val" style="color:${s.color}">${s.val}</div><div class="label">${s.label}</div></div>`).join("");

  document.getElementById("heatmapGrid").innerHTML=cells.map(c=>{
    const cls=c.date===TODAY?"heatmap-cell today-cell":"heatmap-cell";
    return`<div class="${cls}" style="background:${getColor(c.score)};border:1px solid rgba(37,37,37,.3)" title="${c.date}: ${c.score}/${CRITERIA.length}"></div>`;
  }).join("");

  document.getElementById("heatmapLegend").innerHTML=
    `<span>0</span>`+[0,2,4,6,8].map(s=>`<div class="box" style="background:${getColor(s)}"></div>`).join("")+`<span>${CRITERIA.length}</span>`;

  const sm=document.getElementById("streakMsg");
  if(streak>=3){sm.style.display="block";sm.textContent=`🔥 ${streak} jours — lâche rien !`}else{sm.style.display="none"}
}

// ─── RENDER INSIGHTS ───
function renderInsights(){
  const el=document.getElementById("insightsContent");
  const entries=Object.entries(days).filter(([,d])=>d.score>0);
  if(entries.length<3){
    el.innerHTML=`<div style="padding:40px;text-align:center"><div style="font-size:48px;margin-bottom:16px">📊</div><div style="color:var(--sub);font-size:15px;font-weight:500">3 jours minimum pour les insights</div><div style="color:#333;font-size:13px;margin-top:8px">Continue à logger !</div></div>`;
    return;
  }
  let html=`<div class="insight-header">BASÉ SUR ${entries.length} JOURS</div>`;

  // Sleep correlation
  const ws=entries.filter(([,d])=>d.sleepDuration&&d.score);
  if(ws.length>=3){
    const good=ws.filter(([,d])=>d.sleepDuration>=7);
    const bad=ws.filter(([,d])=>d.sleepDuration<7);
    const aG=good.length?(good.reduce((s,[,d])=>s+d.score,0)/good.length).toFixed(1):null;
    const aB=bad.length?(bad.reduce((s,[,d])=>s+d.score,0)/bad.length).toFixed(1):null;
    if(aG&&aB){
      const diff=(aG-aB).toFixed(1);
      html+=`<div class="card"><div class="card-title">💤 SOMMEIL → SCORE</div><div class="corr-row">
        <div style="text-align:center"><div class="corr-val" style="color:var(--green)">${aG}</div><div class="corr-label">Nuits 7h+</div></div>
        <div style="text-align:center"><div class="corr-val" style="color:var(--red)">${aB}</div><div class="corr-label">Nuits &lt;7h</div></div>
      </div><div class="corr-diff">+${diff} pts quand tu dors 7h+</div></div>`;
    }
  }

  // Meal correlation
  const wm=entries.filter(([,d])=>d.meals?.length>0&&d.score);
  if(wm.length>=3){
    const ok=wm.filter(([,d])=>d.meals.reduce((s,m)=>s+(m.calories||0),0)>=2200);
    const low=wm.filter(([,d])=>d.meals.reduce((s,m)=>s+(m.calories||0),0)<2200);
    const aO=ok.length?(ok.reduce((s,[,d])=>s+d.score,0)/ok.length).toFixed(1):null;
    const aL=low.length?(low.reduce((s,[,d])=>s+d.score,0)/low.length).toFixed(1):null;
    if(aO&&aL){
      const diff=(aO-aL).toFixed(1);
      html+=`<div class="card"><div class="card-title">🍽️ NUTRITION → SCORE</div><div class="corr-row">
        <div style="text-align:center"><div class="corr-val" style="color:var(--green)">${aO}</div><div class="corr-label">2200+ kcal</div></div>
        <div style="text-align:center"><div class="corr-val" style="color:var(--red)">${aL}</div><div class="corr-label">&lt;2200 kcal</div></div>
      </div><div class="corr-diff">+${diff} pts quand tu manges assez</div></div>`;
    }
  }

  // Protein rate
  if(wm.length>0){
    const protDays=wm.filter(([,d])=>d.meals.reduce((s,m)=>s+(m.protein||0),0)>=TARGET_PROT);
    const rate=Math.round(protDays.length/wm.length*100);
    const c=rate>=70?"var(--green)":rate>=40?"var(--yellow)":"var(--red)";
    html+=`<div class="card"><div class="card-title">🎯 OBJECTIF PROTÉINES</div><div style="text-align:center"><div class="corr-val" style="color:${c}">${rate}%</div><div class="corr-label">des jours à ${TARGET_PROT}g+</div></div></div>`;
  }

  // Best/worst habits
  const counts={};CRITERIA.forEach(c=>{counts[c.id]=0});
  entries.forEach(([,d])=>{if(d.checks)Object.entries(d.checks).forEach(([k,v])=>{if(v)counts[k]=(counts[k]||0)+1})});
  const sorted=Object.entries(counts).sort(([,a],[,b])=>b-a);
  const bestC=CRITERIA.find(c=>c.id===sorted[0]?.[0]);
  const worstC=CRITERIA.find(c=>c.id===sorted[sorted.length-1]?.[0]);
  html+=`<div class="card"><div class="card-title">🏆 HABITUDES</div><div class="habit-row">
    <div class="habit-item"><div class="emoji">${bestC?.emoji}</div><div class="name" style="color:var(--green)">${bestC?.label}</div><div class="count">${sorted[0]?.[1]}/${entries.length} jours</div><div style="font-size:10px;color:var(--green);margin-top:4px">ta force 💪</div></div>
    <div class="habit-item"><div class="emoji">${worstC?.emoji}</div><div class="name" style="color:var(--red)">${worstC?.label}</div><div class="count">${sorted[sorted.length-1]?.[1]}/${entries.length} jours</div><div style="font-size:10px;color:var(--red);margin-top:4px">à bosser 🎯</div></div>
  </div></div>`;

  if(!ws.length&&!wm.length){
    html+=`<div style="text-align:center;color:#333;font-size:13px;padding:16px">Log sommeil + repas pour débloquer les corrélations</div>`;
  }
  el.innerHTML=html;
}

// ─── RENDER TAB ───
function renderTab(){
  updateHeaderBadge();
  if(currentTab==="score")renderScore();
  else if(currentTab==="sleep")renderSleep();
  else if(currentTab==="meals")renderMeals();
  else if(currentTab==="heatmap")renderHeatmap();
  else if(currentTab==="insights")renderInsights();
}

buildTabbar();updateDateNav();renderTab();
