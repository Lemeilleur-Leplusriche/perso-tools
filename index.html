<script>
const D=[
{id:"push_heavy",label:"Push Lourd",day:"LUN",focus:"Pecs + Epaules + Triceps",rpe:"8-9",
activation:"2x20 pompes lentes",
exercises:[
{id:"inc_db_h",name:"Dev incline halteres 30\u00b0",s:4,r:"6-8",rest:150,dw:26,prio:1,
how:"Banc a 30\u00b0 PAS 45\u00b0. Omoplates serrees en arriere et en bas AVANT de decrocher les halteres. Descente lente 3s jusqu'aux clavicules, coudes a 45\u00b0 du corps PAS 90\u00b0. Pousse en haut en convergent legerement les halteres vers l'interieur. Poignets DROITS alignes avec les avant-bras. Tete plaquee contre le banc."},
{id:"inc_bar_h",name:"Dev incline barre 30\u00b0",s:3,r:"8-10",rest:120,dw:50,note:"? Monter semaine pro",
how:"Meme angle 30\u00b0. La barre descend vers les clavicules, pas vers les tetas. Pousse verticale. Garde les omoplates serrees pendant tout le mouvement. Si le dos se cambre c'est trop lourd."},
{id:"cable_fly_low",name:"Cable fly low-to-high",s:3,r:"12-15",rest:60,dw:11,
how:"Poulies en position basse. Bras QUASI TENDUS avec un leger pli au coude FIXE \u2014 le coude ne plie pas plus pendant le mouvement. Mouvement en arc de bas vers le haut, comme un calin a un arbre geant. Buste FIXE face a la machine \u2014 ZERO rotation du torse. Si ton corps tourne c'est trop lourd baisse de 30%. Split stance : un pied devant un pied derriere. Squeeze 1s en haut. Leger, pas d'ego."},
{id:"flat_db",name:"Dev couche halteres",s:3,r:"8-10",rest:120,dw:24,
how:"Secondaire. Omoplates serrees, pieds bien plantes au sol. Descente controlee, coudes a 45\u00b0 PAS 90\u00b0. Poignets droits. Pas besoin de forcer, les inclines font le gros du boulot."},
{id:"ohp_db",name:"Dev militaire halteres",s:4,r:"8-10",rest:120,dw:14,
how:"Assis, banc a 80-85\u00b0. Coudes a 30\u00b0 DEVANT le corps comme un Y, PAS sur les cotes comme un T. Les coudes en T ca force sur l'epaule et tu risques un impingement. Monte les halteres VERTICALEMENT au dessus de la tete, ils convergent legerement en haut. Descends jusqu'au niveau des oreilles PAS plus bas. Poignets DROITS \u2014 si ils cassent c'est trop lourd. Gainage abdos + fessiers serre. Si tu cambres le dos c'est trop lourd, baisse. Tete plaquee contre le banc."},
{id:"lat_raise_h",name:"Elevations laterales",s:4,r:"12-15",rest:60,dw:8,
how:"TON PROBLEME : tu swingues au lieu de monter sur les cotes. Correction : legerement penche en avant 5-10\u00b0. Halteres sur les COTES des cuisses PAS devant. Monte les bras sur les COTES jusqu'a parallele au sol PAS au dessus. Pouces legerement vers le bas comme si tu verses de l'eau. Montee 2s, pause 1s en haut, descente 2s. ZERO elan ZERO swing. Test : dos contre un mur, si tu peux pas monter sans decoller du mur c'est de l'elan. 8kg sans mur en controlant chaque rep. Dis toi cotes, lent, pause a chaque rep."},
{id:"dips_h",name:"Dips ou pushdown",s:3,r:"8-12",rest:90,dw:0,
how:"Dips version pecs : corps penche EN AVANT 30\u00b0, jambes croisees derriere. Coudes s'ecartent a 45\u00b0. Descends jusqu'a 90\u00b0 aux coudes PAS plus bas \u2014 si ca pique au sternum c'est trop profond. Montee en serrant les pecs. Si le sternum pique malgre l'amplitude reduite \u2192 remplace par pushdown poulie. Pushdown : coudes COLLES au corps, seuls les avant-bras bougent. Si +15 reps au PDC ajoute du lest."},
{id:"tri_ext_h",name:"Extension triceps poulie",s:3,r:"12-15",rest:60,dw:25,
how:"Coudes COLLES au corps, ils ne bougent pas. Seuls les avant-bras travaillent. Extension complete en bas, squeeze 1s. Remontee controlee. Si tes coudes s'ecartent c'est trop lourd."}
]},
{id:"pull_heavy",label:"Pull Lourd",day:"MAR",focus:"Dos + Biceps + Cou",rpe:"8-9",asym:1,
activation:"DRILL RETRACTION : allonge face au sol, bras en T (90° du corps), pouces vers le plafond. Souleve les mains de quelques cm, SERRE les omoplates 3s, redescends. 2x15. Puis 2x10 scapular pull-ups (pends toi a la barre, tire les omoplates vers le bas SANS plier les bras). + elastique : bras tendus devant toi, tire l'elastique vers ta poitrine en ecartant les mains, bras quasi tendus — isole la retraction scapulaire. 2x15.",
note:"Pense COUDES pas mains. Tes mains = des crochets. STRAPS obligatoires sur tous les tirages.",
cardio:{type:"Zone 2",name:"Marche inclinee",detail:"Tapis 5.5 km/h, pente 10-12%. Tu dois pouvoir parler mais pas chanter.",why:"Base aerobie, brule du gras, ameliore la circulation sanguine.",duration:25,icon:"\uD83D\uDEB6"},
exercises:[
{id:"pullups_h",name:"Tractions prise large",s:4,r:"6-10",rest:150,dw:0,prio:1,
how:"ROI DU DOS. Utilise des STRAPS. Correction en 7 etapes : 1) Pends toi bras tendus relax. 2) SANS plier les bras, tire les omoplates VERS LE BAS \u2014 les epaules s'eloignent des oreilles, ton corps monte de 5-10cm. C'est le dos qui initie. 3) ENSUITE plie les coudes pour tirer. 4) Amene ta POITRINE vers la barre pas juste le menton \u2014 le buste se penche legerement en arriere. 5) Squeeze les omoplates 2s en haut. 6) Descente LENTE 3s. 7) Extension COMPLETE bras tendus en bas. Jambes croisees SOUS toi pas derriere. Echauffement : 2x10 scapular pull-ups avant chaque seance Pull."},
{id:"row_bar_h",name:"Rowing barre pronation",s:4,r:"6-8",rest:150,dw:45,
how:"Buste penche a 45\u00b0, dos PLAT. STRAPS obligatoires. Tire la barre vers le NOMBRIL pas vers la poitrine. Initie avec les omoplates \u2014 serre les AVANT de plier les coudes. Squeeze les omoplates 1s en haut — tu dois sentir entre les omoplates pas juste derriere les epaules. Descente lente 2s, laisse les omoplates s'ecarter completement pour un stretch max. Equilibre la force gauche/droite."},
{id:"db_row_h",name:"Rowing haltere 1 bras",s:3,r:"8-10",rest:90,dw:12,note:"? Go 14 semaine pro",asym:1,
how:"TOUJOURS commencer par le cote GAUCHE. Meme charge des deux cotes. Genou + main droite sur le banc, dos plat parallele au sol. Tire le coude vers la HANCHE pas vers l'epaule. Squeeze l'omoplate 2s en haut. Descente lente 2-3s. Mets ta main libre SUR ton lat pour sentir la contraction."},
{id:"pullover_h",name:"Pullover poulie haute",s:3,r:"12-15",rest:60,dw:32,
how:"Isole le grand dorsal. Debout face a la poulie haute. Bras quasi tendus, tire en arc vers les hanches. Pense a pousser les coudes vers le sol. C'est le seul exo qui isole vraiment le lat \u2014 concentre toi sur la contraction du lat gauche."},
{id:"face_pull_h",name:"Face pulls",s:4,r:"15-20",rest:60,dw:24,prio:1,
how:"NON NEGOCIABLE a chaque seance pull. Cable en position HAUTE (au dessus de la tete), attache une corde. Prise avec les pouces vers toi. Recule d'un pas, bras tendus devant toi. Tire la corde vers ton VISAGE (front/yeux) PAS vers la poitrine, en ecartant les mains. Position finale : mains de chaque cote de la tete au niveau des oreilles, coudes HAUTS et en arriere, rotation externe \u2014 les mains finissent AU DESSUS des coudes comme un double biceps. Squeeze les omoplates 1-2s. Corps DROIT, pas de lean back. Poids LEGER, 15-20 reps. Tu dois sentir ca entre les omoplates et derriere les epaules."},
{id:"shrugs_h",name:"Shrugs halteres",s:3,r:"12-15",rest:60,dw:24,
how:"Monte les epaules DROIT vers les oreilles. Hold 2s en haut. Descente lente. Ne roule JAMAIS les epaules c'est inutile et dangereux. STRAPS pour aller plus lourd."},
{id:"ez_curl_h",name:"Curl barre EZ",s:3,r:"8-10",rest:90,dw:30,
how:"Prise sur les parties angulees interieures de la barre. Coudes FIXES le long du corps. Si ton buste bouge pour generer de l'elan c'est trop lourd. Extension complete en bas. Montee 2s, descente 2s."},
{id:"hammer_h",name:"Curl marteau",s:3,r:"12-15",rest:60,dw:12,
how:"Prise neutre, paumes face a face. Monte le long du corps sans tourner le poignet. Cible le brachial et l'avant-bras. Descente controlee 2s. Coudes fixes."},
{id:"neck_curl_h",name:"Neck curl (flexion avant)",s:3,r:"20",rest:60,dw:2.5,
how:"10 MIN BLOC COU en fin de seance. Allonge face vers le haut, tete qui depasse du banc. Disque + serviette sur le front. Ramene le menton vers la poitrine. Tempo 2s montee, 2s descente. Sem 1-2: 2.5kg, sem 3-4: 5kg, puis +0.5-1kg/sem. Objectif: 15-20kg a 6 mois. Tour de cou 34cm > 40cm en 12 mois."},
{id:"neck_lat_h",name:"Flexion laterale cou",s:2,r:"15/cote",rest:60,dw:0,
how:"Assis, main sur le cote de la tete. Resiste en penchant l'oreille vers l'epaule. Ou allonge sur le cote avec disque. Les deux cotes. Leger, juste la resistance. Tempo 2s/2s."}
]},
{id:"legs_quad",label:"Legs Quadri",day:"MER",focus:"Quads + Mollets + Abdos",rpe:"8-9",
exercises:[
{id:"squat",name:"Squat barre",s:4,r:"6-8",rest:180,dw:60,prio:1,
how:"ROI DES EXOS. Pieds largeur epaules, pointes legerement ouvertes 15-30\u00b0. Initie en poussant les hanches EN ARRIERE comme si tu t'assois sur une chaise. Descends au moins a parallele \u2014 le pli de la hanche au niveau du genou minimum. Genoux dans l'axe des pieds, ils ne rentrent JAMAIS vers l'interieur. Pousse le sol avec TOUT le pied en remontant, pas juste les orteils. Dos droit, regard devant, poitrine sortie. Si le dos s'arrondit c'est trop lourd."},
{id:"leg_press_q",name:"Presse a cuisses",s:4,r:"10-12",rest:120,dw:72,
how:"Pieds au milieu de la plateforme, largeur epaules. Descends jusqu'a 90\u00b0 aux genoux, le bas du dos ne decolle PAS du dossier \u2014 si il decolle c'est trop profond ou trop lourd. Pousse avec les talons. Ne verrouille jamais completement en haut, garde une legere flexion."},
{id:"walking_lunge",name:"Fentes marchees",s:3,r:"10/jambe",rest:120,
how:"Grand pas en avant. Genou arriere frole le sol sans toucher. Torse droit, regard devant. Pousse avec le talon de la jambe avant pour te relever. Alterne gauche droite. Si t'as du mal a garder l'equilibre c'est normal au debut, tiens toi a un rack."},
{id:"leg_ext_q",name:"Leg extension",s:3,r:"12-15",rest:60,dw:24,
how:"Regle le dossier pour que tes genoux soient alignes avec l'axe de rotation de la machine. Tends COMPLETEMENT la jambe, squeeze le quadriceps 2s en haut. Descente controlee 2s. Pas d'elan, pas de rebond en bas."},
{id:"leg_curl_q",name:"Leg curl allonge",s:4,r:"10-12",rest:90,dw:24,
how:"Contracte les ischios pour amener le pied vers les fesses. Squeeze 1s en haut. Descente LENTE 2-3s \u2014 c'est la phase excentrique qui fait grossir les ischios. Pas d'elan. Hanches restent collees au banc."},
{id:"calf_stand",name:"Mollets debout",s:4,r:"12-15",rest:60,
how:"Sur une marche, talons dans le vide. Monte sur la pointe LE PLUS HAUT possible. Pause 2s en haut. Descends lentement en etirant bien \u2014 le talon va EN DESSOUS de la marche pour un full stretch. Full range of motion = cle pour les mollets. Pas de rebond en bas."},
{id:"crunch_cable",name:"Crunch poulie haute",s:3,r:"15-20",rest:60,
how:"TON PROBLEME : tu sens pas tes abdos. Correction : a genoux ASSIS SUR LES TALONS. Corde derriere la tete, mains a cote des oreilles \u2014 elles BOUGENT PAS. Contracte les abdos AVANT de bouger \u2014 serre comme si quelqu'un allait te frapper au ventre. Puis ENROULE le buste vers le sol \u2014 pense front vers le bassin. La hanche ne bouge PAS. Expire FORT en crunching \u2014 souffle tout l'air. Pause 2s en bas squeeze max. Si tu sens toujours rien \u2192 remplace par crunch au sol ou dead bug."},
{id:"plank",name:"Planche",s:3,r:"45-60s",rest:60,
how:"Corps parfaitement aligne : pas de creux dans le dos, pas les fesses en l'air. Serre les fessiers et les abdos. Respire normalement. Si 60s est facile ajoute du poids sur le dos."}
]},
{id:"push_vol",label:"Push Volume",day:"JEU",focus:"Pecs volume + Epaules",rpe:"7-8",
activation:"2x20 pompes lentes",
note:"Tempo 3-1-1 : 3s descente, 1s pause, 1s montee",
cardio:{type:"Tabata",name:"HIIT Tabata",detail:"20s sprint MAX / 10s repos x 8 rounds. Velo, rameur ou course. 4 minutes de souffrance.",why:"VO2max, explosivite, endurance sexuelle. Plus efficace que 45min de cardio modere.",duration:4,icon:"\u26A1"},
exercises:[
{id:"inc_machine",name:"Dev incline machine/Smith",s:4,r:"10-12",rest:90,dw:60,
how:"TEMPO 3-1-1 sur chaque rep. 3s pour descendre, 1s pause en bas, 1s pour monter. Controle total, sens chaque fibre du haut des pecs travailler. Omoplates serrees. Coudes a 45\u00b0."},
{id:"inc_fly",name:"Ecarte incline halteres 30\u00b0",s:3,r:"12-15",rest:60,dw:18,
how:"Banc a 30\u00b0. Bras legerement flechis \u2014 le pli au coude est FIXE pendant tout le mouvement. Descends en etirant bien les pecs. Remonte en serrant. Ne descends pas trop bas ca force sur l'epaule. C'est un mouvement d'ouverture/fermeture, pas de pousse."},
{id:"cable_fly_vol",name:"Cable fly low-to-high",s:3,r:"15-20",rest:60,dw:7,
how:"Memes corrections que lundi. Buste FIXE, bras quasi tendus, zero rotation. Pump maximum. Leger, plein de reps. Squeeze en haut a chaque rep."},
{id:"flat_db_vol",name:"Dev couche halteres",s:3,r:"10-12",rest:90,dw:20,
how:"Secondaire. Omoplates serrees. Descente controlee. Coudes a 45\u00b0. Poignets droits."},
{id:"lat_raise_drop",name:"Elevations lat + drop set",s:4,r:"12-15",rest:60,dw:8,
how:"Memes corrections que lundi \u2014 ZERO swing, mouvement lateral PAS devant/derriere. Derniere serie = DROP SET : fais tes reps, pose les halteres immediatement, prends 30% plus leger, continue jusqu'a l'echec total. Sensation de brulure garantie dans les delts."},
{id:"rear_delt",name:"Oiseau inverse rear delt",s:3,r:"15-20",rest:60,dw:5,
how:"Penche en avant 45\u00b0. Tire les coudes vers l'arriere en ouvrant les bras. Cible l'arriere de l'epaule. Tres leger. Squeeze 1s en haut. Si tu sens les trapezes au lieu de l'arriere d'epaule, baisse le poids et concentre toi sur les coudes qui s'ecartent."},
{id:"skull_crush",name:"Skull crushers",s:3,r:"10-12",rest:90,
how:"Barre EZ. Descends la barre vers le FRONT pas derriere la tete. Coudes fixes pointant vers le plafond, seuls les avant-bras bougent. Si les coudes s'ecartent c'est trop lourd. Cible la longue portion du triceps."},
{id:"kickback",name:"Pushdown corde ou kickbacks",s:3,r:"15",rest:60,
how:"Finition pump. Extension complete, squeeze en bas. Coudes colles au corps. Sens les triceps bruler. Leger, beaucoup de reps."}
]},
{id:"pull_vol",label:"Pull Volume",day:"VEN",focus:"Dos largeur + Biceps + Cou",rpe:"7-8",asym:1,
activation:"DRILL RETRACTION : allonge face au sol, bras en T (90° du corps), pouces vers le plafond. Souleve les mains de quelques cm, SERRE les omoplates 3s, redescends. 2x15. Puis band pull-apart : elastique bras tendus devant toi, ecarte en gardant les bras quasi tendus — isole la retraction scapulaire pure. 2x15.",
note:"Machines + cables. Focus connexion neuro-musculaire",
exercises:[
{id:"lat_pull",name:"Lat pulldown prise large",s:4,r:"10-12",rest:90,asym:1,note:"CORRECTION ASYMETRIE : fais d'abord 3x10-12 single-arm pulldown ou machine convergente, cote GAUCHE en premier. La droite matche les memes reps/charge. Ensuite seulement le bilateral.",dw:52,
how:"THUMBLESS GRIP : pouce PAR-DESSUS la barre a cote de l'index, PAS enroule en dessous. Ca desactive les avant-bras et force les lats. PRISE SYMETRIQUE : repere les marques sur la barre et aligne les deux mains a egale distance du cable central. Largeur = 1.5x epaules PAS aux extremites. LEAN BACK 10-15 degres en arriere, poitrine sortie vers la barre \u2014 c'est le point le plus important, sans ca tu recrutes les traps au lieu des lats. Tire les COUDES vers les hanches PAS sur les cotes. Omoplates vers le bas AVANT de plier les bras \u2014 la barre bouge de 5-10cm juste avec les omoplates. Squeeze 1s en bas. Remontee lente 3s, bras completement tendus en haut, laisse les omoplates remonter pour un stretch max. ALTERNATIVE RECOMMANDEE : machine convergente a poignees independantes pour corriger l'asymetrie. Sur le unilateral, garde le torse FIXE, pas de rotation — plaque ta main libre sur ta cuisse pour te stabiliser. Amplitude COMPLETE en haut pour stretch max du lat."},
{id:"row_cable",name:"Rowing poulie basse V-bar",s:4,r:"10-12",rest:90,dw:25,
how:"STRETCH : en position etiree, laisse le cable tirer tes epaules vers l'avant, arrondis LEGEREMENT le haut du dos pour ouvrir les omoplates. Initie le tirage en SERRANT les omoplates l'une contre l'autre AVANT de plier les coudes. Tire la V-bar vers le NOMBRIL pas vers la poitrine. SQUEEZE 2s entre les omoplates en fin de mouvement \u2014 tu dois sentir une contraction ENTRE les omoplates, pas juste derriere les epaules. Si tu sens les biceps ou le haut des traps, tes coudes montent trop haut \u2014 garde les pres du corps direction hanches. Descente LENTE 3s. Ne te penche pas en arriere pour tricher. SI TU SENS DERRIERE LES EPAULES ET LATS MAIS PAS AU MILIEU DU DOS : tu ne serres pas assez les omoplates. Fix : en position contractee, pousse la poitrine vers l'avant ET serre les omoplates en arriere. Tiens 2-3s. Baisse le poids si necessaire et fais des reps lentes avec squeeze 3s. Drill a vide : assis droit, bras le long du corps, rapproche tes omoplates au max — tu dois sentir ca bruler entre les deux os. C'est cette sensation a reproduire en fin de rep."},
{id:"div_row",name:"Diverging seated row (unilateral)",s:3,r:"10-12",rest:90,dw:23,asym:1,
how:"Machine a poignees divergentes \u2014 les poignees s'ecartent naturellement en tirant, ce qui force une meilleure retraction des omoplates. Poitrine PLAQUEE contre le pad, elle ne decolle JAMAIS. UNILATERAL : commence par le cote GAUCHE, la droite matche les memes reps/charge. Tire le coude vers l'arriere, laisse la poignee diverger naturellement. Squeeze les omoplates 2s en fin de mouvement. Tu dois sentir ca ENTRE les omoplates. Sur le unilateral, ton corps ne doit PAS tourner vers le cote qui tire — garde le torse FIXE, seul le bras bouge. Plaque l'autre main sur ta cuisse ou le pad pour te stabiliser. Amplitude COMPLETE : remonte completement en haut pour etirer le lat a fond avant de retirer. Une fois l'equilibre G/D corrige (2-3 semaines), passe en bilateral."},
{id:"pullover_vol",name:"Pullover poulie haute",s:3,r:"15-20",rest:60,dw:32,
how:"Grand dorsal isole. Bras quasi tendus. Tire en arc de cercle vers les hanches. Pense coudes vers le sol. Leger, connexion neuro-musculaire. Focus contraction lat gauche."},
{id:"face_pull_vol",name:"Face pulls",s:4,r:"15-20",rest:60,dw:23,prio:1,
how:"NON NEGOCIABLE a chaque seance pull. Cable en position HAUTE (au dessus de la tete), attache une corde. Prise avec les pouces vers toi. Recule d'un pas, bras tendus devant toi. Tire la corde vers ton VISAGE (front/yeux) PAS vers la poitrine, en ecartant les mains. Position finale : mains de chaque cote de la tete au niveau des oreilles, coudes HAUTS et en arriere, rotation externe \u2014 les mains finissent AU DESSUS des coudes comme un double biceps. Squeeze les omoplates 1-2s. Corps DROIT, pas de lean back. Poids LEGER, 15-20 reps. Tu dois sentir ca entre les omoplates et derriere les epaules."},
{id:"curl_incline",name:"Curl incline halteres",s:3,r:"10-12",rest:60,dw:12,
how:"Banc au 2eme ou 3eme cran en partant du plat (environ 45\u00b0). Tete et dos PLAQUES au banc du debut a la fin \u2014 si ta tete decolle c'est que tu triches, baisse le poids. Bras pendants derriere toi, paumes vers l'avant. Ca donne un stretch max de la longue portion du biceps en bas de chaque rep. Monte en pliant les coudes sans bouger les epaules. Descente LENTE 3s jusqu'a extension complete \u2014 c'est le stretch en bas qui rend cet exo superieur aux curls debout. Coudes fixes pointes vers le sol. Si tu balances le corps c'est trop lourd."},
{id:"curl_spider",name:"Curl concentre",s:3,r:"12-15",rest:60,dw:6,asym:1,
how:"Assis au bout d'un banc, jambes ecartees. Un haltere dans une main, cale l'arriere du bras (le triceps) contre l'interieur de ta cuisse. Bras qui pend vers le sol = position de depart. Monte l'haltere en pliant le coude, squeeze le biceps 2s en haut. Descente lente 2s. Le bras ne bouge PAS de ta cuisse \u2014 seul l'avant-bras travaille. C'est le meilleur exo pour le pic du biceps (courte portion). Commence par le cote GAUCHE. Fais le bruler."},
{id:"neck_curl_v",name:"Neck curl (flexion avant)",s:3,r:"20",rest:60,dw:2.5,

{id:"neck_lat_v",name:"Flexion laterale cou",s:2,r:"15/cote",rest:60,dw:0,
how:"Main sur le cote de la tete. Resiste en penchant oreille vers epaule. Les deux cotes. 10 min max pour tout le bloc cou."}
]},
{id:"legs_ischio",label:"Legs Ischio",day:"SAM",focus:"Ischios + Fessiers + Abdos + Cou",rpe:"7-8",
cardio:{type:"Recup active",name:"Marche inclinee legere",detail:"Tapis 5 km/h, pente 6%. Tranquille, pas d'effort. Juste bouger les jambes.",why:"Flush l'acide lactique, accelere la recup pour la semaine prochaine.",duration:10,icon:"\uD83C\uDFB5"},
exercises:[
{id:"rdl",name:"Romanian Deadlift RDL",s:4,r:"8-10",rest:150,prio:1,
how:"Debout, barre contre les cuisses. Pousse les fesses EN ARRIERE, jambes quasi tendues avec un leger pli aux genoux. La barre GLISSE le long des cuisses et tibias \u2014 elle reste COLLEE a tes jambes. Dos PLAT toute la duree \u2014 si le dos s'arrondit c'est trop lourd ou tu descends trop bas. Descends jusqu'a sentir l'etirement des ischios, pas plus. Remonte en serrant les fessiers en haut. Regard devant, pas vers le sol."},
{id:"press_high",name:"Presse pieds hauts serres",s:3,r:"10-12",rest:120,

{id:"bulgarian",name:"Bulgarian split squat",s:3,r:"10/jambe",rest:90,
how:"Pied arriere sur un banc. Grand pas en avant. Descends profond, genou arriere vers le sol. Le genou avant ne depasse pas excessivement la pointe du pied. Torse droit. Excellent pour la stabilite et les fessiers. Douloureux mais efficace. Commence au PDC puis ajoute des halteres."},
{id:"leg_curl_i",name:"Leg curl allonge",s:4,r:"10-12",rest:60,

{id:"hip_thrust",name:"Hip thrust",s:3,r:"12-15",rest:90,
how:"Haut du dos sur le banc, pieds a plat au sol largeur epaules. Pousse les hanches vers le plafond. SQUEEZE les fessiers 2s en haut \u2014 imagine que tu serres une piece entre les fesses. Redescends lent 2s. C'est le meilleur exo fessiers."},
{id:"calf_seated",name:"Mollets assis",s:4,r:"15-20",rest:60,
how:"Cible le soleaire (mollet profond). Full range of motion. Pause stretch 2s en bas talon le plus bas possible. Pause squeeze 2s en haut sur la pointe. Lent et controle. Pas de rebond."},
{id:"leg_raise",name:"Releve de jambes suspendu",s:3,r:"12-15",rest:60,
how:"Suspendu a la barre. Monte les genoux AU DESSUS des hanches \u2014 pas juste a 90\u00b0 mais plus haut. Pas de balancement \u2014 si tu balances tu triches. Controle la descente 2s. Cible les abdos du bas. Si trop dur jambes tendues, plie les genoux."},
{id:"ab_wheel",name:"Ab wheel ou crunch cable",s:3,r:"12-15",rest:60,
how:"Ab wheel : a genoux, mains sur la roue. Roule vers l'avant en gardant les abdos SERRES. Ne laisse PAS le bas du dos se creuser \u2014 si il se creuse tu es alle trop loin, reduis l'amplitude. Reviens en contractant les abdos. Crunch cable : memes corrections que mercredi."},
{id:"neck_ext_s",name:"Neck extension (flexion arriere)",s:3,r:"20",rest:60,dw:2.5,
how:"Allonge FACE VERS LE SOL, tete qui depasse du banc. Disque + serviette sur l'arriere du crane. Releve la tete en gardant le corps immobile. Tempo 2s montee, 2s descente. Sem 1-2: 2.5kg, sem 3-4: 5kg, puis +0.5-1kg/sem. Objectif 6 mois: 15-20kg."},
{id:"shrugs_s",name:"Shrugs lourds",s:3,r:"12",rest:90,dw:24,
